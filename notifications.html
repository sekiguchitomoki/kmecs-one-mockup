<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10">
    <div class="sec-label">PCN / EOL</div>
    <h1 class="sec-title text-3xl mt-1 mb-2">製品変更情報</h1>
    <p class="text-[16px] text-neutral-500 mb-6" id="lead">お客様の<b class="text-ink">購入履歴に紐づく</b>製品変更通知（PCN）・生産終了通知（EOL）です。代替品のご提案もあわせてご確認ください。</p>

    <div class="space-y-4" id="list"></div>

    <div class="card p-5 mt-6 text-[15px] text-neutral-500 leading-relaxed" style="background:var(--paper)">
      ※ PCN（Product Change Notification）＝製品の仕様・材質・製造変更のお知らせ。<br>
      ※ EOL（End of Life）＝生産終了のお知らせ。最終受注期限・後継品情報を掲載します。<br>
      ※ 通知は購入履歴に基づき、お客様アカウントへ自動配信されます。
    </div>
  </div>
</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  // codes = この通知が該当する製品型番。ログイン顧客の購入履歴(CUST_ORDERS)と突合して出し分ける。
  var NOTES = [
    { type:'EOL', urgent:true, codes:['EDS-408A'], date:'2026/07/10',
      title:'MOXA EDS-408A 生産終了（EOL）のご案内',
      body:'EDS-408A は 2026/09 を最終受注として生産終了予定です。後継の EDS-518A（上位互換）への切替をご検討ください。最終手配のご相談を承ります。',
      altCode:'EDS-518A', alt:'EDS-518A（後継・上位互換）' },
    { type:'PCN', urgent:false, codes:['AMC-2P-08','CBL-AMC-2M'], date:'2026/06/12',
      title:'ODU AMC シリーズ コンタクト材質変更のご案内',
      body:'AMC シリーズのコンタクト材質を変更します。RoHS 対応は継続、互換性・寸法への影響はありません。仕様変更資料は技術部にて作成しております。',
      altCode:'', alt:'該当なし（継続購入可）' },
    { type:'PCN', urgent:false, codes:['NPort-5150A'], date:'2026/06/28',
      title:'MOXA NPort-5150A ファームウェア仕様変更のご案内',
      body:'NPort-5150A の FW を v2.10 に更新します。既存構成への影響は軽微です。FW指定が必要な場合は備考欄にご記載ください。',
      altCode:'', alt:'該当なし（継続購入可）' },
  ];
  function badge(t,u){
    if(t==='EOL') return '<span class="badge text-white" style="background:#e60012">EOL 生産終了</span>'+(u?' <span class="badge bg-black text-white">要確認</span>':'');
    return '<span class="badge bg-amber-100 text-amber-700">PCN 仕様変更</span>';
  }
  // 顧客の購入履歴から、対象型番の購入実績を集計
  function purchasesOf(accKey, codes){
    var rows=[], total=0;
    (window.CUST_ORDERS||[]).filter(function(o){return o.acc===accKey;}).forEach(function(o){
      (o.lines||[]).forEach(function(l){
        if(codes.indexOf(l.code)>=0){ rows.push({ym:(o.date||'').slice(0,7), code:l.code, qty:l.qty}); total+=l.qty; }
      });
    });
    rows.sort(function(a,b){return a.ym<b.ym?1:-1;}); // 新しい順
    return {rows:rows, total:total};
  }
  function histText(pur){
    if(!pur.rows.length) return '';
    var parts=pur.rows.map(function(r){ var p=getProduct(r.code); return r.ym.replace('/','-')+' '+(p?p.code:r.code)+' ×'+r.qty; });
    return '購入実績：合計 '+pur.total+' 台 ／ '+parts.join('・');
  }

  KMECS.renderUserShell({
    active:'notifications',
    crumbs:[{label:'トップ',href:'index.html'},{label:'PCN / EOL 情報'}],
    onReady:function(){
      var a = KMECS.account();
      var list = document.getElementById('list');

      if(!a){
        document.getElementById('lead').innerHTML = '製品変更通知（PCN）・生産終了通知（EOL）の一覧です。<b class="text-ink">ログインすると、購入履歴に紐づく通知</b>と代替品のご提案が表示されます。';
        // ゲスト：全件を「例」として表示（購入実績は非表示）
        renderNotes(NOTES.map(function(n){return Object.assign({},n,{pur:null});}), false);
        return;
      }

      // ログイン：購入履歴と突合し、該当する通知のみ表示
      var matched = NOTES.map(function(n){ return Object.assign({}, n, {pur:purchasesOf(a.key, n.codes)}); })
                         .filter(function(n){ return n.pur.total>0; });
      document.getElementById('lead').innerHTML = 'お客様（<b class="text-ink">'+a.company+'</b>）の<b class="text-ink">購入履歴に紐づく</b>製品変更通知（PCN）・生産終了通知（EOL）です。代替品のご提案もあわせてご確認ください。';

      if(!matched.length){
        list.innerHTML = '<div class="card p-8 text-center text-[16px] text-neutral-500">現在、貴社の購入履歴に該当する製品変更・生産終了のお知らせはありません。<div class="text-[14px] text-neutral-400 mt-2">新しい通知は購入履歴に基づき、自動でこちらに表示されます。</div></div>';
        return;
      }
      renderNotes(matched, true);
    }
  });

  // 通知カード描画（ゲスト/ログイン共通）
  function renderNotes(notes, loggedIn){
    document.getElementById('list').innerHTML = notes.map(function(n){
      var hist = (loggedIn && n.pur) ? histText(n.pur) : '';
      return '<div class="card p-6 '+(n.urgent?'border-l-4':'')+'" '+(n.urgent?'style="border-left-color:#e60012"':'')+'>'
        + '<div class="flex flex-wrap items-center justify-between gap-2 mb-3"><div class="flex items-center gap-2">'+badge(n.type,n.urgent)+'</div>'
        + '<span class="text-[14px] text-neutral-400 font-display">'+n.date+'</span></div>'
        + '<h3 class="text-base font-bold text-ink">'+n.title+'</h3>'
        + '<p class="text-[16px] text-neutral-600 mt-2 leading-relaxed">'+n.body+'</p>'
        + (hist ? '<div class="text-[14px] mt-2 inline-block px-2.5 py-1" style="background:var(--paper);color:#555">'+hist+'</div>' : '')
        + '<div class="mt-4 pt-4 border-t border-[color:var(--line)] flex flex-wrap items-center justify-between gap-3">'
        + '<div class="text-[15px] text-neutral-500">'+(n.altCode?'後継品のご提案：':'対応：')+'<b class="text-ink">'+n.alt+'</b></div>'
        + '<div class="flex gap-2">'
        + (n.altCode ? '<a href="product-detail.html?code='+n.altCode+'" class="btn-red !py-2 !px-4 !text-[15px]">後継品を見る</a>' : '')
        + '<a href="contact.html" class="btn-red-o !py-2 !px-4 !text-[15px]">営業に相談</a>'
        + '</div></div></div>';
    }).join('');
  }
</script>
</body>
</html>
