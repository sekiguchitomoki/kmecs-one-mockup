<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10">
    <div class="sec-label">ORDERS</div>
    <h1 class="sec-title text-3xl mt-1 mb-2">注文履歴・進捗</h1>
    <p class="text-[16px] text-neutral-500 mb-6">発注品目の進行状況・納期・ヤマト送り状番号・入金状況をご確認いただけます。</p>

    <div id="guest" class="hidden card p-16 text-center">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e60012" stroke-width="1.8" class="mx-auto mb-3"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <div class="font-bold text-ink">注文情報の表示にはログインが必要です</div>
      <a href="login.html" class="btn-red mt-5">ログイン</a>
    </div>

    <div id="main">
      <!-- 工程の凡例 -->
      <div class="card p-4 mb-5">
        <div class="text-[15px] font-bold text-ink mb-3">受発注フロー</div>
        <div class="flex flex-wrap items-center gap-x-2 gap-y-2 text-[14px] text-neutral-500">
          <span class="badge bg-neutral-100 text-neutral-600">① 見積</span><span>›</span>
          <span class="badge bg-neutral-100 text-neutral-600">② 受発注</span><span>›</span>
          <span class="badge bg-neutral-100 text-neutral-600">③ 問合せ</span><span>›</span>
          <span class="badge bg-neutral-100 text-neutral-600">④ 出荷</span><span>›</span>
          <span class="badge bg-neutral-100 text-neutral-600">⑤ 請求</span><span>›</span>
          <span class="badge bg-neutral-100 text-neutral-600">⑥ 入金</span>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-between gap-2 mb-4">
        <div class="text-sm">全 <b class="font-display text-lg" id="count">0</b> 件</div>
        <div class="flex gap-1 text-[15px]" id="filters">
          <button class="fb px-4 py-2 text-white" data-f="all" style="background:#e60012">すべて</button>
          <button class="fb px-4 py-2 border border-[color:var(--line)] text-neutral-600 bg-white" data-f="active">進行中</button>
          <button class="fb px-4 py-2 border border-[color:var(--line)] text-neutral-600 bg-white" data-f="unpaid">未入金</button>
        </div>
      </div>

      <div class="space-y-3" id="list"></div>
    </div>
  </div>
</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var STEPS = CUST_STEPS;
  var ORDERS = CUST_ORDERS; // data.js の共通マスタ
  // 明細から品目サマリ文字列を生成（例：MOXA EDS-408A ×2 他1点）
  function itemsText(o){
    var first=getProduct(o.lines[0].code);
    return first.name+' ×'+o.lines[0].qty + (o.lines.length>1? ' 他'+(o.lines.length-1)+'点':'');
  }
  function payBadge(p){
    if(p==='未入金') return '<span class="badge text-white" style="background:#e60012">未入金</span>';
    if(p==='入金済') return '<span class="badge bg-emerald-100 text-emerald-700">入金済</span>';
    if(p==='請求済') return '<span class="badge bg-amber-100 text-amber-700">請求済</span>';
    return '<span class="badge bg-neutral-100 text-neutral-500">未請求</span>';
  }
  function stepper(step){
    var h='<div class="flex items-center">';
    for(var i=0;i<STEPS.length;i++){
      var cls = i<step?'step-done':(i===step?'step-current':'step-todo');
      var lb  = i<step?'✓':(i+1);
      h += '<div class="flex flex-col items-center"><div class="step-dot '+cls+'">'+lb+'</div>'
         + '<div class="text-[13px] mt-1 whitespace-nowrap '+(i<=step?'text-neutral-600 font-bold':'text-neutral-300')+'">'+STEPS[i]+'</div></div>';
      if(i<STEPS.length-1) h += '<div class="step-line '+(i<step?'on':'')+'"></div>';
    }
    return h+'</div>';
  }

  KMECS.renderUserShell({
    active:'orders',
    crumbs:[{label:'トップ',href:'index.html'},{label:'注文・進捗'}],
    onReady:function(){
      var a = KMECS.account();
      if(!a){ document.getElementById('guest').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); return; }
      var f = qs('f') || 'all';   // マイページのカードから ?f=active / lead / unpaid で来る

      function render(){
        var list = ORDERS.filter(function(o){
          if(o.acc !== a.key) return false;
          if(f==='active') return o.step < 6;
          if(f==='unpaid') return o.pay==='未入金';
          if(f==='lead')   return o.step<=2 && o.pay==='未請求';   // 納期回答待ち
          return true;
        });
        document.getElementById('count').textContent = list.length;
        document.getElementById('list').innerHTML = list.map(function(o){
          return '<a href="order-detail.html?no='+o.no+'" class="card card-h p-5 block">'
            + '<div class="flex flex-wrap items-center justify-between gap-2 mb-3">'
            + '<div class="flex items-center gap-2.5"><span class="font-display font-black text-ink">'+o.no+'</span>'
            + '<span class="badge bg-neutral-100 text-neutral-500">'+o.route+'</span>'+payBadge(o.pay)+'</div>'
            + '<div class="text-right text-[14px] text-neutral-400">'+o.date+'　<b class="text-ink font-display text-[17px]">'+yen(o.amount)+'</b></div></div>'
            + '<div class="text-[16px] text-neutral-600 mb-4">'+itemsText(o)+'</div>'
            + '<div class="overflow-x-auto">'+stepper(o.step)+'</div></a>';
        }).join('');
      }

      function paintFb(){
        document.querySelectorAll('.fb').forEach(function(x){
          var on = x.getAttribute('data-f')===f;
          x.className = on ? 'fb px-4 py-2 text-white' : 'fb px-4 py-2 border border-[color:var(--line)] text-neutral-600 bg-white';
          x.style.background = on ? '#e60012' : '';
        });
      }
      document.querySelectorAll('.fb').forEach(function(b){
        b.addEventListener('click', function(){ f = b.getAttribute('data-f'); paintFb(); render(); });
      });
      paintFb();   // ?f= の初期ハイライト（納期回答待ち等・該当ボタンが無い場合は「すべて」表示）
      render();
    }
  });
</script>
</body>
</html>
