      A.sections.forEach(function(s,i){
        html += '<section class="'+(i>0?'mt-12':'')+'">'
          + '<div class="border-t-2 border-ink pt-3 mb-4"><h2 class="text-xl sm:text-2xl font-bold text-ink">'+s.h+'</h2></div>';
        (s.p||[]).forEach(function(par){
          html += '<p class="text-[16px] text-neutral-700 leading-loose mb-4">'+par+'</p>';
        });
        if(s.list && s.list.length){
          html += '<ul class="card p-5 space-y-2.5 my-5" style="background:var(--paper)">'
            + s.list.map(function(li){
                return '<li class="flex gap-3 text-[15px] text-neutral-700 leading-relaxed">'
                  + '<span class="w-5 h-5 mt-0.5 rounded-full flex items-center justify-center text-white shrink-0" style="background:#e60012"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg></span>'
                  + '<span>'+li+'</span></li>';
              }).join('')
            + '</ul>';
        }
        if(s.note){
          html += '<div class="card p-5 my-5 border-l-4" style="border-color:#e60012;background:var(--lav)">'
            + '<div class="flex items-center gap-2 mb-1.5">'
            + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e60012" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'
            + '<div class="text-[15px] font-bold text-ink">'+s.note.t+'</div></div>'
            + '<p class="text-[14px] text-neutral-600 leading-relaxed pl-[26px]">'+s.note.d+'</p></div>';
        }
        html += '</section>';
      });
      html += '</article>';

      // ---- FAQ アコーディオン ----
      if(A.faq && A.faq.length){
        html += '<div class="max-w-[860px] mx-auto px-4 xl:px-8 pb-14">'
          + '<div class="border-t-2 border-ink pt-3 mb-5"><div class="sec-label" style="color:#e60012">FAQ</div>'
          + '<h2 class="text-xl font-bold text-ink mt-0.5">よくある質問</h2></div>'
          + '<div id="sfaq" class="divide-y divide-[color:var(--line)] border-y border-[color:var(--line)]">'
          + A.faq.map(function(x,i){
              return '<div><button type="button" class="sq w-full flex items-start gap-3 text-left py-4" data-i="'+i+'">'
                + '<span class="font-display font-bold shrink-0" style="color:#e60012">Q</span>'
                + '<span class="flex-1 text-[16px] font-bold text-ink">'+x.q+'</span>'
                + '<span class="si shrink-0 text-neutral-400 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span></button>'
                + '<div class="sa hidden pb-4 pl-7"><p class="text-[15px] text-neutral-600 leading-relaxed">'+x.a+'</p></div></div>';
            }).join('')
          + '</div></div>';
      }

      // ---- 関連記事 ----
      var pos = ORDER.indexOf(reqId in ARTICLES ? reqId : ORDER[0]);
      var related = [];
      for(var k=1; related.length<3 && k<ORDER.length; k++){
        related.push(ORDER[(pos+k)%ORDER.length]);
      }
      html += '<div class="max-w-[1000px] mx-auto px-4 xl:px-8 pb-4">'
        + '<div class="border-t-2 border-ink pt-3 mb-5"><div class="sec-label">RELATED</div>'
        + '<h2 class="text-lg font-bold text-ink mt-0.5">関連する技術情報・コラム</h2></div>'
        + '<div class="grid sm:grid-cols-3 gap-5">'
        + related.map(function(rid){
            var r = ARTICLES[rid];
            return '<a href="tech-detail.html?id='+rid+'" class="card card-h sweep overflow-hidden flex flex-col">'
              + '<div class="h-32 overflow-hidden border-b border-[color:var(--line)]"><img src="'+r.img+'" alt="" class="w-full h-full object-cover sweep-img"></div>'
              + '<div class="p-4 flex-1 flex flex-col">'
              + '<div class="flex items-center gap-2 mb-1.5"><span class="text-[13px] text-neutral-400 font-display">'+r.date+'</span>'+catBadge(r.cat)+'</div>'
              + '<div class="text-[15px] font-bold text-ink leading-snug flex-1">'+r.title+'</div>'
              + '<div class="mt-3 text-[14px] font-bold" style="color:#e60012">続きを読む ›</div></div></a>';
          }).join('')
        + '</div></div>';

      // ---- 導線（一覧・製品・問い合わせ）----
      html += '<div class="max-w-[1000px] mx-auto px-4 xl:px-8 pb-16">'
        + '<div class="card p-8 mt-10 flex flex-wrap items-center justify-between gap-4" style="background:#22243a">'
        + '<div><h3 class="text-lg font-bold text-white">仕様の検討・型番選定でお困りですか？</h3>'
        + '<p class="text-[15px] text-neutral-300 mt-1.5">記事の内容に沿った製品選定・構成のご相談は、認定エンジニアがご対応します。</p></div>'
        + '<div class="flex flex-wrap gap-3">'
        + '<a href="tech.html" class="btn-ink whitespace-nowrap !bg-white !text-ink">コラム一覧へ</a>'
        + '<a href="products.html" class="btn-ink whitespace-nowrap !bg-white/10 !text-white">製品を探す</a>'
        + '<a href="contact.html" class="btn-red whitespace-nowrap">お問い合わせ</a></div></div></div>';

      host.innerHTML = html;

      // FAQ アコーディオン（event-detail の sq/sa 実装を踏襲）
      document.querySelectorAll('#sfaq .sq').forEach(function(b){
        b.addEventListener('click', function(){
          var box=b.parentNode.querySelector('.sa'); var ic=b.querySelector('.si');
          var open=box.classList.toggle('hidden'); ic.style.transform = open ? '' : 'rotate(180deg)';
        });
      });
    }
  });
</script>
</body>
</html>
