<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10">
    <div class="sec-label">PRODUCTS</div>
    <h1 class="sec-title text-3xl mt-1 mb-6">製品を探す</h1>

    <div id="priceNote" class="mb-6"></div>

    <div class="grid lg:grid-cols-4 gap-8">
      <!-- 絞り込み -->
      <aside class="lg:col-span-1">
        <div class="border-t-2 border-ink pt-3 mb-5">
          <div class="text-[17px] font-bold text-ink mb-3">詳細条件で絞り込む</div>
          <label class="sec-label">キーワード</label>
          <input id="kw" class="w-full mt-1.5 border border-[color:var(--line)] px-3 py-2.5 text-sm outline-none focus:border-[color:var(--brand)]" placeholder="型番・キーワード">
        </div>
        <div class="border-t border-[color:var(--line)] pt-4 mb-5">
          <div class="text-[16px] font-bold text-ink mb-2.5">メーカー</div>
          <div class="space-y-2 text-[16px] text-neutral-700" id="makerFilter"></div>
        </div>
        <div class="border-t border-[color:var(--line)] pt-4 mb-5">
          <div class="text-[16px] font-bold text-ink mb-2.5">カテゴリ</div>
          <div class="space-y-2 text-[16px] text-neutral-700 max-h-52 overflow-y-auto" id="catFilter"></div>
        </div>
        <div class="border-t border-[color:var(--line)] pt-4 mb-5">
          <div class="text-[16px] font-bold text-ink mb-2.5">条件</div>
          <label class="flex items-center gap-2 text-[16px] text-neutral-700"><input type="checkbox" id="stockOnly" class="accent-[#e60012]"> 在庫ありのみ</label>
        </div>
        <button id="clear" class="w-full border border-[color:var(--line)] text-neutral-500 text-[15px] py-2.5 hover:bg-neutral-50">条件をクリア</button>
      </aside>

      <!-- 一覧 -->
      <div class="lg:col-span-3">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b-2 border-ink pb-3 mb-5">
          <div class="text-sm">商品検索結果：<b class="font-display text-lg" id="count">0</b> 件</div>
          <div class="flex items-center gap-2">
            <select id="sort" class="border border-[color:var(--line)] px-2 py-1.5 text-[15px] outline-none bg-white">
              <option value="rec">おすすめ順</option>
              <option value="low">価格が安い順</option>
              <option value="high">価格が高い順</option>
            </select>
          </div>
        </div>
        <div class="space-y-3" id="list"></div>
        <div id="empty" class="hidden card p-16 text-center text-sm text-neutral-400">条件に一致する製品がありません。</div>
      </div>
    </div>
  </div>

</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  function tagBadge(t){
    if(t==='EOL予定') return '<span class="badge text-white" style="background:#e60012">EOL予定</span>';
    if(t==='長納期')  return '<span class="badge bg-amber-100 text-amber-700">長納期</span>';
    if(t==='定番')    return '<span class="badge bg-ink text-white">定番</span>';
    if(t==='上位')    return '<span class="badge bg-neutral-200 text-neutral-700">上位機種</span>';
    return '';
  }

  KMECS.renderUserShell({
    active:'products',
    crumbs:[{label:'トップ',href:'index.html'},{label:'製品を探す'}],
    onReady:function(){
      var a = KMECS.account();

      document.getElementById('priceNote').innerHTML = a
        ? '<div class="card px-4 py-3 text-[15px] flex items-center gap-2"><span class="badge text-white" style="background:#e60012">得値ランク'+a.rank+'</span>'
          + '<span class="text-neutral-600">'+a.company+' 様のお取引価格（得値・'+a.terms+'）を表示しています。</span></div>'
        : '<div class="border-l-4 bg-white card px-4 py-3 text-[15px] flex flex-wrap items-center justify-between gap-2" style="border-left-color:#e60012">'
          + '<span class="text-neutral-600">価格はログイン後に表示されます（既存お取引先様向けB2B専用）。</span>'
          + '<a href="login.html" class="font-bold" style="color:#e60012">ログイン →</a></div>';

      document.getElementById('makerFilter').innerHTML = Object.keys(MAKERS).map(function(k){
        return '<label class="flex items-center gap-2"><input type="checkbox" class="mk accent-[#e60012]" value="'+k+'"> '+MAKERS[k].name+'</label>';
      }).join('');
      document.getElementById('catFilter').innerHTML = CATEGORIES.map(function(c){
        var n = productsByCat(c.key).length;
        return '<label class="flex items-center gap-2 '+(n?'':'opacity-40')+'"><input type="checkbox" class="ct accent-[#e60012]" value="'+c.key+'"> '+c.ja+' <span class="text-neutral-400">('+n+')</span></label>';
      }).join('');

      var pm = qs('maker'); if(pm){ var e1=document.querySelector('.mk[value="'+pm+'"]'); if(e1) e1.checked=true; }
      var pc = qs('cat');   if(pc){ var e2=document.querySelector('.ct[value="'+pc+'"]'); if(e2) e2.checked=true; }
      var q = qs('q'); if(q) document.getElementById('kw').value = q;

      function render(){
        var kw = document.getElementById('kw').value.trim().toLowerCase();
        var mks = [].slice.call(document.querySelectorAll('.mk:checked')).map(function(c){return c.value;});
        var cts = [].slice.call(document.querySelectorAll('.ct:checked')).map(function(c){return c.value;});
        var stockOnly = document.getElementById('stockOnly').checked;
        var sort = document.getElementById('sort').value;

        var list = PRODUCTS.filter(function(p){
          if(mks.length && mks.indexOf(p.maker)<0) return false;
          if(cts.length && cts.indexOf(p.cat)<0) return false;
          if(stockOnly && p.stock<=0) return false;
          if(kw){
            var hay = (p.name+' '+p.code+' '+p.catJa+' '+MAKERS[p.maker].name).toLowerCase();
            if(hay.indexOf(kw)<0) return false;
          }
          return true;
        });
        if(sort==='low')  list = list.slice().sort(function(x,y){return x.price-y.price;});
        if(sort==='high') list = list.slice().sort(function(x,y){return y.price-x.price;});

        document.getElementById('count').textContent = list.length;
        document.getElementById('empty').classList.toggle('hidden', list.length>0);

        // ダイワボウ風の横並びリスト
        document.getElementById('list').innerHTML = list.map(function(p){
          return '<div class="card card-h p-4 flex flex-col sm:flex-row gap-4">'
            + '<input type="checkbox" class="accent-[#e60012] mt-1 hidden sm:block">'
            + '<a href="product-detail.html?code='+p.code+'" class="w-full sm:w-32 h-28 shrink-0 overflow-hidden bg-white border border-[color:var(--line)] flex items-center justify-center p-2"><img src="'+prodImg(p)+'" alt="" class="max-w-full max-h-full object-contain"></a>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex items-center gap-2 mb-1">'+tagBadge(p.tag)+'<span class="text-[14px] text-neutral-400 font-display">'+MAKERS[p.maker].name+'</span></div>'
            + '<a href="product-detail.html?code='+p.code+'" class="text-[17px] font-bold hover:underline" style="color:#e60012">'+p.name+'</a>'
            + '<div class="text-[15px] text-neutral-500 mt-1">商品コード：<span class="font-display">'+p.code+'</span> ・ '+p.catJa+'</div>'
            + '<p class="text-[15px] text-neutral-500 mt-1 leading-relaxed line-clamp-2">'+p.desc+'</p>'
            + '<a href="product-detail.html?code='+p.code+'" class="text-[14px] text-neutral-400 hover:text-[color:var(--brand)] mt-1 inline-block">続きを見る ›</a>'
            + '</div>'
            + '<div class="sm:w-44 shrink-0 sm:text-right sm:border-l sm:border-[color:var(--line)] sm:pl-4">'
            + '<div class="text-lg">'+priceOrMask(p.price)+'</div>'
            + '<div class="text-[14px] text-neutral-400">標準価格 '+yen(p.price)+'</div>'
            + '<div class="mt-2 text-[14px] '+(p.stock>0?'text-emerald-600':'text-amber-600')+'">'+(p.stock>0?('在庫 '+p.stock+' 個'):'取寄')+' ・ 納期 '+p.lead+'</div>'
            + '<a href="product-detail.html?code='+p.code+'" class="btn-red !py-2 !px-4 !text-[15px] mt-3 w-full sm:w-auto">詳細・カートへ</a>'
            + '</div></div>';
        }).join('');
      }

      document.getElementById('kw').addEventListener('input', render);
      document.getElementById('sort').addEventListener('change', render);
      document.getElementById('stockOnly').addEventListener('change', render);
      document.querySelectorAll('.mk,.ct').forEach(function(c){ c.addEventListener('change', render); });
      document.getElementById('clear').addEventListener('click', function(){
        document.getElementById('kw').value='';
        document.getElementById('stockOnly').checked=false;
        document.querySelectorAll('.mk,.ct').forEach(function(c){c.checked=false;});
        render();
      });
      render();
    }
  });
</script>
</body>
</html>
