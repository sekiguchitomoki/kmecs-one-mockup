<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <a href="admin-orders.html" class="inline-flex items-center gap-1 text-[13px] text-neutral-500 hover:text-[color:var(--brand)] mb-3">‹ 受注管理一覧に戻る</a>
  <div id="body"></div>

</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var no = qs('no') || (ADMIN_ORDERS[0] && ADMIN_ORDERS[0].no);
  var o = ADMIN_ORDERS.filter(function(x){return x.no===no;})[0] || ADMIN_ORDERS[0];

  KMECS.renderAdminShell({
    active:'admin-orders',
    title:'受注詳細 '+o.no,
    sub:'受注の工程・顧客・金額・IBM連携状況',
    onReady:function(){
      var c=getCustomer(o.cust)||{company:o.cust,rep:'—',rank:'-',terms:'-',addr:'-',contact:'-'};
      var st=ORDER_STATUS[o.status];
      // 工程マップ（① 見積→②受発注→③問合せ→④出荷→⑤請求→⑥入金）
      var STEPS=['見積','受発注','問合せ','出荷','請求','入金'];
      var stepIdx={arranging:2, shipped:4, billed:5, unpaid:5, paid:6};
      var cur=stepIdx[o.status]!==undefined?stepIdx[o.status]:2;
      var stepper='';
      for(var i=0;i<STEPS.length;i++){
        var cls=i<cur?'step-done':(i===cur?'step-current':'step-todo');
        var lb=i<cur?'✓':(i+1);
        stepper+='<div class="flex flex-col items-center"><div class="step-dot '+cls+'">'+lb+'</div>'
          +'<div class="text-[11px] mt-1.5 '+(i<=cur?'text-ink font-bold':'text-neutral-300')+'">'+STEPS[i]+'</div></div>';
        if(i<STEPS.length-1) stepper+='<div class="step-line '+(i<cur?'on':'')+' mb-5"></div>';
      }

      // IBM連携（ダミー）
      var ibm = o.status==='arranging'?'auto':(o.no==='WO-24070'?'error':'auto');
      var ibmBadge = ibm==='error'
        ? '<span class="badge text-white" style="background:#e60012">連携エラー</span><span class="text-[12px] text-neutral-400 ml-1">在庫マスタ不整合</span>'
        : '<span class="badge bg-emerald-100 text-emerald-700">● 自動IP済</span><span class="text-[12px] text-neutral-400 ml-1">受注IP / 発注IP 完了</span>';

      document.getElementById('body').innerHTML=
        // ヘッダー
        '<div class="adm-card p-5 mb-4 flex flex-wrap items-center justify-between gap-3">'
        + '<div><div class="flex items-center gap-2 mb-1"><span class="font-display font-black text-2xl text-ink">'+o.no+'</span>'
        + '<span class="badge '+st.cls+'" style="background:'+st.bg+'">'+st.ja+'</span>'
        + '<span class="badge bg-neutral-100 text-neutral-600">'+o.route+'</span></div>'
        + '<div class="text-[13px] text-neutral-500">受注日 '+o.date+' ・ 担当営業 '+c.rep+'</div></div>'
        + '<div class="text-right"><div class="text-[12px] text-neutral-400">受注金額（税込）</div>'
        + '<div class="font-display text-2xl font-black text-ink">'+yen(o.amount)+'</div></div></div>'

        // 工程
        + '<div class="adm-card p-5 mb-4"><div class="text-[14px] font-bold text-ink mb-4">工程の進行状況</div>'
        + '<div class="overflow-x-auto"><div class="flex items-center min-w-[560px]">'+stepper+'</div></div></div>'

        + '<div class="grid lg:grid-cols-3 gap-4">'
        // 明細
        + '<div class="lg:col-span-2 space-y-4">'
        + '<div class="adm-card overflow-hidden"><div class="px-4 py-3 border-b border-[#dcdce6] text-[14px] font-bold text-ink">受注明細</div>'
        + '<div class="overflow-x-auto"><table class="w-full adm-table"><thead><tr><th class="text-left px-4 py-2.5">品目</th><th class="text-right py-2.5">数量</th><th class="text-right py-2.5">単価</th><th class="text-right px-4 py-2.5">金額</th></tr></thead>'
        + '<tbody><tr><td class="px-4 py-3 text-neutral-700">'+o.items+'</td><td class="py-3 text-right font-display">一式</td>'
        + '<td class="py-3 text-right font-display">'+yen(Math.round(o.amount/1.1))+'</td><td class="px-4 py-3 text-right font-display font-bold text-ink">'+yen(Math.round(o.amount/1.1))+'</td></tr>'
        + '<tr><td class="px-4 py-2 text-right text-neutral-500" colspan="3">消費税(10%)</td><td class="px-4 py-2 text-right font-display">'+yen(o.amount-Math.round(o.amount/1.1))+'</td></tr>'
        + '<tr style="border-top:2px solid #333"><td class="px-4 py-2 text-right font-bold text-ink" colspan="3">合計（税込）</td><td class="px-4 py-2 text-right font-display font-black text-ink">'+yen(o.amount)+'</td></tr>'
        + '</tbody></table></div></div>'
        // IBM連携
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">IBM基幹 連携状況</div>'
        + '<div class="text-[14px]">'+ibmBadge+'</div>'
        + (ibm==='error'?'<button class="mt-3 text-[13px] text-white px-3 py-1.5" style="background:#e60012" onclick="alert(\'IBMへ再送信しました。（モック）\')">再送信</button>':'')
        + '</div>'
        // やりとり
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-3">メモ / やりとり</div>'
        + '<ul class="space-y-2.5 text-[13px]">'
        + '<li class="flex gap-3"><span class="text-neutral-400 w-24 shrink-0 font-display">'+o.date+' 10:20</span><span class="text-neutral-600"><b class="text-ink">お客様</b>：出荷FW指定あり。</span></li>'
        + '<li class="flex gap-3"><span class="text-neutral-400 w-24 shrink-0 font-display">'+o.date+' 11:05</span><span class="text-neutral-600"><b style="color:#e60012">CS 山田</b>：承知しました。手配します。</span></li>'
        + '</ul></div>'
        + '</div>'
        // 右：顧客
        + '<div class="space-y-4">'
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">顧客情報</div>'
        + '<div class="text-[15px] font-bold text-ink">'+c.company+'</div>'
        + '<div class="text-[13px] text-neutral-500 mt-1 leading-relaxed">'+(c.code||'')+'<br>ご担当：'+c.contact+' 様<br>担当営業：'+c.rep+'<br>'+(c.addr||'')+'</div>'
        + '<div class="mt-2 pt-2 border-t border-[#eee] text-[13px]">支払条件：'+(c.terms||'-')+'</div>'
        + '<a href="admin-customer-detail.html?code='+(c.code||'')+'" class="mt-3 inline-block text-[13px]" style="color:#e60012">顧客詳細を開く ›</a></div>'
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">関連</div>'
        + '<div class="space-y-1.5 text-[13px]"><a href="admin-orders.html" class="block hover:underline" style="color:#e60012">受注管理一覧 ›</a>'
        + '<a href="admin-shipping.html" class="block hover:underline" style="color:#e60012">出荷・送り状発行 ›</a>'
        + '<a href="admin-invoice.html" class="block hover:underline" style="color:#e60012">請求書発行 ›</a></div></div>'
        + '</div></div>';
    }
  });
</script>
</body>
</html>
