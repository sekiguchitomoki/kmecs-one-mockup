<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <a href="admin-orders.html" class="inline-flex items-center gap-1 text-[13px] text-neutral-500 hover:text-[color:var(--brand)] mb-3">‹ 受注管理一覧に戻る</a>
  <div id="body"></div>

  <!-- 返品受付モーダル -->
  <div id="rtModal" class="hidden fixed inset-0 z-50 bg-black/50 p-4 overflow-y-auto">
    <div class="max-w-lg mx-auto my-10 bg-white">
      <div class="flex items-center justify-between px-5 py-3 border-b border-[#dcdce6]">
        <h3 class="font-bold text-ink text-[16px]">返品受付（RMA発行）</h3>
        <button id="rtClose" class="text-neutral-400 hover:text-ink text-xl leading-none">&times;</button>
      </div>
      <div class="p-5 space-y-4 text-[14px]">
        <div class="text-[13px] text-neutral-500">出荷済の受注に対する返品を受け付け、RMA番号を発行します。IBMへ返品インプット（在庫戻し・赤伝／返金の起票）される想定です。</div>
        <div id="rtLines" class="space-y-2"></div>
        <div class="grid sm:grid-cols-2 gap-3">
          <div><label class="text-[13px] font-bold text-neutral-600">返品理由 <span style="color:#e60012">*</span></label>
            <select id="rtReason" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 bg-white"><option value="">選択してください</option><option>初期不良</option><option>員数違い・誤出荷</option><option>仕様相違</option><option>輸送破損</option><option>顧客都合</option></select></div>
          <div><label class="text-[13px] font-bold text-neutral-600">返金・処理区分</label>
            <select id="rtRefund" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 bg-white"><option>返金（赤伝発行）</option><option>代替品を再出荷</option><option>次回請求で相殺</option></select></div>
        </div>
        <div><label class="text-[13px] font-bold text-neutral-600">備考</label>
          <textarea id="rtMemo" rows="2" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 outline-none focus:border-[color:var(--brand)]" placeholder="不良症状・入荷予定・連絡事項など"></textarea></div>
      </div>
      <div class="flex gap-2 justify-end px-5 py-3 border-t border-[#dcdce6]" style="background:var(--lav)">
        <button id="rtCancel" class="text-[14px] border border-[#dcdce6] bg-white text-neutral-600 px-4 py-2">やめる</button>
        <button id="rtSubmit" class="text-[14px] text-white px-4 py-2 font-bold" style="background:#e60012">返品を受け付ける</button>
      </div>
    </div>
  </div>

</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var no = qs('no') || (ADMIN_ORDERS[0] && ADMIN_ORDERS[0].no);
  var o = ADMIN_ORDERS.filter(function(x){return x.no===no;})[0] || ADMIN_ORDERS[0];

  // IBMインプット状況・納期・出荷（受注管理一覧と同じ値）
  var IBM_MAP={'WO-24072':'check','WO-24071':'check','WO-24068':'check','WO-24070':'error'};
  var LEAD_MAP={'WO-24074':'2026/07/20','WO-24073':'2026/07/17','WO-24071':'2026/07/18','WO-24069':'2026/07/16','WO-24067':'2026/07/12'};
  var SHIP_MAP={'WO-24073':'出荷準備中','WO-24069':'出荷済','WO-24066':'出荷済'};
  // 返品受付済みサンプルの返品情報
  var RET_MAP={'WO-24066':{ rma:'RMA-2607-014', reason:'初期不良', refund:'返金（赤伝発行）', memo:'電源投入時にリンクLED不点灯。メーカーへ現品返送予定。', qty:'MOXA EDS-518A ×2', date:'2026/06/26' }};
  // 受注管理一覧に載っている件は一覧と同じ納期・出荷を表示（それ以前の受注は完了扱い）
  var LISTED=['WO-24076','WO-24075','WO-24074','WO-24073','WO-24072','WO-24071','WO-24070','WO-24069','WO-24068','WO-24067','WO-24066'];
  var inList = LISTED.indexOf(o.no)>=0;
  var done = !inList && o.status!=='arranging';   // 一覧より前の出荷済以降の受注
  var SHIPDATE_MAP={'WO-24073':'2026/07/18','WO-24069':'2026/07/16'};
  var S={
    status:o.status,
    ibm: IBM_MAP[o.no] || 'auto',
    lead: LEAD_MAP[o.no] || (done ? o.date : ''),
    ship: SHIP_MAP[o.no] || (done ? '出荷済' : ''),
    shipDate: SHIPDATE_MAP[o.no] || (done ? o.date : ''),
    lines:[{name:o.items, qty:'一式', price:Math.round(o.amount/1.1)}],
    edit:false,
    ret: RET_MAP[o.no] || null,   // 返品情報 {rma, reason, refund, memo, qty, date}
    history:[{d:o.date+' 09:40', u:'受注登録（'+o.route+'）', by:'システム'}]
  };

  KMECS.renderAdminShell({
    active:'admin-orders',
    title:'受注詳細 '+o.no,
    sub:'受注の工程・顧客・金額・IBM連携状況',
    onReady:function(){ draw(); }
  });

  function subtotal(){ return S.lines.reduce(function(s,l){ return s + (l.qty==='一式'? l.price : l.price*l.qty); },0); }

  function draw(){
      var c=getCustomer(o.cust)||{company:o.cust,rep:'—',rank:'-',terms:'-',addr:'-',contact:'-'};

      // 工程（出荷は「出荷連絡→出荷準備中→出荷」に細分化）
      var STEPS=['見積','受発注','納期連絡','出荷連絡','出荷準備中','出荷','請求','入金'];
      var cur;
      if(!S.lead) cur=2;
      else if(!S.ship) cur=3;
      else if(S.ship==='出荷準備中') cur=4;
      else cur=({shipped:6, billed:7, unpaid:7, paid:8})[S.status]||6;
      var stopped = (S.status==='canceled'||S.status==='returned');
      var stepper='';
      for(var i=0;i<STEPS.length;i++){
        var cls=i<cur?'step-done':(i===cur?'step-current':'step-todo');
        var lb=i<cur?'✓':(i+1);
        stepper+='<div class="flex flex-col items-center"><div class="step-dot '+cls+'">'+lb+'</div>'
          +'<div class="text-[11px] mt-1.5 whitespace-nowrap '+(i<=cur?'text-ink font-bold':'text-neutral-300')+'">'+STEPS[i]+'</div></div>';
        if(i<STEPS.length-1) stepper+='<div class="step-line '+(i<cur?'on':'')+' mb-5"></div>';
      }

      // タグは「経路」と「IBMインプット状況」の2種（＋キャンセル/返品時のみ状態）
      var ibmBadge = S.ibm==='error'
        ? '<span class="badge text-white" style="background:#e60012">連携エラー</span>'
        : S.ibm==='check'
        ? '<span class="badge bg-amber-100 text-amber-700">要チェック</span>'
        : '<span class="badge bg-emerald-100 text-emerald-700">● 自動IP済</span>';
      var stBadge = stopped ? '<span class="badge '+ORDER_STATUS[S.status].cls+'" style="background:'+ORDER_STATUS[S.status].bg+'">'+ORDER_STATUS[S.status].ja+'</span>' : '';

      // 明細（表示 / 編集）
      var lineRows;
      if(!S.edit){
        lineRows = S.lines.map(function(l){
          var amt = l.qty==='一式'? l.price : l.price*l.qty;
          return '<tr><td class="px-4 py-3 text-neutral-700">'+l.name+'</td><td class="py-3 text-right font-display">'+l.qty+'</td>'
            + '<td class="py-3 text-right font-display">'+yen(l.price)+'</td><td class="px-4 py-3 text-right font-display font-bold text-ink">'+yen(amt)+'</td></tr>';
        }).join('');
      }else{
        lineRows = S.lines.map(function(l,i){
          return '<tr style="background:#fffdf5"><td class="px-4 py-2"><input data-i="'+i+'" data-k="name" class="ed w-full border border-[#dcdce6] px-2 py-1.5 text-[13px]" value="'+String(l.name).replace(/"/g,'&quot;')+'"></td>'
            + '<td class="py-2 text-right"><input data-i="'+i+'" data-k="qty" class="ed w-16 border border-[#dcdce6] px-2 py-1.5 text-[13px] text-right font-display" value="'+l.qty+'"></td>'
            + '<td class="py-2 text-right"><input data-i="'+i+'" data-k="price" type="number" class="ed w-28 border border-[#dcdce6] px-2 py-1.5 text-[13px] text-right font-display" value="'+l.price+'"></td>'
            + '<td class="px-4 py-2 text-right"><button class="delLine text-[12px] border px-2 py-1" data-i="'+i+'" style="border-color:#e60012;color:#e60012">行をキャンセル</button></td></tr>';
        }).join('');
      }
      var sub=subtotal();

      // 納期・出荷UI
      var shipUi;
      if(stopped){
        shipUi='<div class="text-[13px] text-neutral-500">この受注は「'+ORDER_STATUS[S.status].ja+'」のため、納期・出荷の操作はできません。</div>';
      }else{
        shipUi=
          '<div class="grid sm:grid-cols-2 gap-4">'
          + '<div><label class="text-[13px] font-bold text-neutral-600">回答納期（メーカー回答）</label>'
          + '<div class="flex gap-1 mt-1"><input id="leadIn" type="date" value="'+(S.lead?S.lead.replace(/\//g,'-'):'')+'" class="flex-1 border border-[#dcdce6] px-3 py-2 text-sm">'
          + '<button id="leadSave" class="text-[13px] text-white px-3 whitespace-nowrap" style="background:#393b56">'+(S.lead?'納期を変更':'納期を保存')+'</button></div>'
          + '<div class="text-[12px] text-neutral-400 mt-1">保存するとIBMへ納期インプットし、顧客ポータル・進捗メールに反映されます。</div></div>'
          + '<div><label class="text-[13px] font-bold text-neutral-600">出荷状況'
          + (S.ship ? '　' + (S.ship==='出荷済' ? '<span class="badge bg-emerald-100 text-emerald-700">出荷済</span>' : '<span class="badge bg-amber-100 text-amber-700">出荷準備中</span>') : '')
          + '</label>'
          + '<div class="flex gap-1 mt-1"><input id="shipIn" type="date" value="'+(S.shipDate?S.shipDate.replace(/\//g,'-'):'2026-07-23')+'" class="flex-1 border border-[#dcdce6] px-3 py-2 text-sm"'+(S.lead?'':' disabled')+'>'
          + (S.ship==='出荷済'
              ? '<button id="shipEdit" class="text-[13px] text-white px-3 whitespace-nowrap" style="background:#393b56">出荷日を変更</button>'
            : S.ship==='出荷準備中'
              ? '<button id="shipEdit" class="text-[13px] text-white px-3 whitespace-nowrap" style="background:#393b56">出荷日を変更</button><button id="shipDone" class="text-[13px] text-white px-3 whitespace-nowrap" style="background:#14887b">出荷済にする</button>'
              : '<button id="shipStart" class="text-[13px] text-white px-3 whitespace-nowrap" style="background:#e60012"'+(S.lead?'':' disabled')+'>出荷連絡・出荷入力（出荷準備中へ）</button>')
          + '</div>'
          + (S.ship==='出荷済' ? '<div class="mt-1.5"><button id="shipBack" class="text-[12px] border px-2 py-1" style="border-color:#f0a500;color:#b25000">出荷準備中に戻す（修正）</button></div>' : '')
          + '<div class="text-[12px] text-neutral-400 mt-1.5">'
          + (S.lead ? '出荷日を入れて出荷連絡 → 出荷準備中 → 送り状発行後に「出荷済」で確定します。出荷日は納期と同様にあとから編集できます。'
                    : '先に回答納期を入力してください。')
          + '</div></div>'
          + '</div>';
      }

      document.getElementById('body').innerHTML=
        // ヘッダー
        '<div class="adm-card p-5 mb-4 flex flex-wrap items-center justify-between gap-3">'
        + '<div><div class="flex items-center gap-2 mb-1 flex-wrap"><span class="font-display font-black text-2xl text-ink">'+o.no+'</span>'
        + '<span class="badge bg-neutral-100 text-neutral-600">'+o.route+'</span>'
        + ibmBadge + stBadge + '</div>'
        + '<div class="text-[13px] text-neutral-500">受注日 '+o.date+' ・ 担当営業 '+c.rep+'</div></div>'
        + '<div class="text-right"><div class="text-[12px] text-neutral-400">受注金額（税込）</div>'
        + '<div class="font-display text-2xl font-black text-ink">'+yen(Math.round(sub*1.1))+'</div></div></div>'

        // 工程
        + '<div class="adm-card p-5 mb-4"><div class="flex items-center justify-between mb-4"><div class="text-[14px] font-bold text-ink">工程の進行状況</div>'
        + (stopped?'<span class="text-[12px]" style="color:#e60012">「'+ORDER_STATUS[S.status].ja+'」のため工程は停止しています</span>':'')+'</div>'
        + '<div class="overflow-x-auto"><div class="flex items-center min-w-[720px] '+(stopped?'opacity-40':'')+'">'+stepper+'</div></div></div>'

        // 納期・出荷
        + '<div class="adm-card p-5 mb-4"><div class="text-[14px] font-bold text-ink mb-3">納期・出荷</div>'+shipUi+'</div>'

        + '<div class="grid lg:grid-cols-3 gap-4">'
        // 明細
        + '<div class="lg:col-span-2 space-y-4">'
        + '<div class="adm-card overflow-hidden"><div class="px-4 py-3 border-b border-[#dcdce6] flex items-center justify-between">'
        + '<span class="text-[14px] font-bold text-ink">受注明細</span>'
        + (stopped?'' : (S.edit
            ? '<span class="flex gap-1"><button id="addLine" class="text-[12px] border border-[#dcdce6] bg-white text-neutral-600 px-2.5 py-1">＋ 品目を追加</button>'
              + '<button id="editSave" class="text-[12px] text-white px-2.5 py-1" style="background:#e60012">保存</button>'
              + '<button id="editCancel" class="text-[12px] border border-[#dcdce6] bg-white text-neutral-500 px-2.5 py-1">やめる</button></span>'
            : '<button id="editStart" class="text-[12px] border border-[#dcdce6] bg-white text-neutral-600 px-2.5 py-1">明細を編集</button>'))
        + '</div>'
        + '<div class="overflow-x-auto"><table class="w-full adm-table"><thead><tr><th class="text-left px-4 py-2.5">品目</th><th class="text-right py-2.5">数量</th><th class="text-right py-2.5">単価</th><th class="text-right px-4 py-2.5">'+(S.edit?'操作':'金額')+'</th></tr></thead>'
        + '<tbody>'+lineRows
        + (S.edit?'':'<tr><td class="px-4 py-2 text-right text-neutral-500" colspan="3">消費税(10%)</td><td class="px-4 py-2 text-right font-display">'+yen(Math.round(sub*0.1))+'</td></tr>'
        + '<tr style="border-top:2px solid #333"><td class="px-4 py-2 text-right font-bold text-ink" colspan="3">合計（税込）</td><td class="px-4 py-2 text-right font-display font-black text-ink">'+yen(Math.round(sub*1.1))+'</td></tr>')
        + '</tbody></table></div>'
        + '<div class="px-4 py-3 border-t border-[#eceef5]" style="background:var(--paper)"><div class="text-[12px] font-bold text-neutral-500 mb-1.5">変更履歴（編集したユーザー・日時が残ります）</div>'
        + '<ul class="space-y-1 text-[12px] text-neutral-500">'
        + S.history.map(function(h){ return '<li class="flex gap-2"><span class="font-display shrink-0">'+h.d+'</span><span>'+h.u+'</span><span class="text-neutral-400">／ '+h.by+'</span></li>'; }).join('')
        + '</ul></div></div>'
        // IBM連携
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">IBM基幹 連携状況</div>'
        + '<div class="text-[14px] flex items-center gap-2 flex-wrap">'+ibmBadge
        + (S.ibm==='auto'?'<span class="text-[12px] text-neutral-400">受注IP / 発注IP 完了</span>':'')
        + (S.ibm==='check'?'<span class="text-[12px] text-neutral-400">CS確認待ち — 内容を確認のうえ承認してください</span>':'')
        + (S.ibm==='error'?'<span class="text-[12px] text-neutral-400">在庫マスタ不整合</span>':'')+'</div>'
        + (S.ibm==='check'?'<button id="approve" class="mt-3 text-[13px] text-white px-3 py-1.5" style="background:#14887b">承認してIBM連携</button>':'')
        + (S.ibm==='error'?'<button id="resend" class="mt-3 text-[13px] text-white px-3 py-1.5" style="background:#e60012">再送信</button>':'')
        + '</div>'
        // やりとり
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-3">メモ / やりとり</div>'
        + '<ul class="space-y-2.5 text-[13px]">'
        + '<li class="flex gap-3"><span class="text-neutral-400 w-24 shrink-0 font-display">'+o.date+' 10:20</span><span class="text-neutral-600"><b class="text-ink">お客様</b>：出荷FW指定あり。</span></li>'
        + '<li class="flex gap-3"><span class="text-neutral-400 w-24 shrink-0 font-display">'+o.date+' 11:05</span><span class="text-neutral-600"><b style="color:#e60012">CS 山田</b>：承知しました。手配します。</span></li>'
        + '</ul></div>'
        + '</div>'
        // 右：顧客・操作
        + '<div class="space-y-4">'
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">顧客情報</div>'
        + '<div class="text-[15px] font-bold text-ink">'+c.company+'</div>'
        + '<div class="text-[13px] text-neutral-500 mt-1 leading-relaxed">'+(c.code||'')+'<br>ご担当：'+c.contact+' 様<br>担当営業：'+c.rep+'<br>'+(c.addr||'')+'</div>'
        + '<div class="mt-2 pt-2 border-t border-[#eee] text-[13px]">支払条件：'+(c.terms||'-')+'</div>'
        + '<a href="admin-customer-detail.html?code='+(c.code||'')+'" class="mt-3 inline-block text-[13px]" style="color:#e60012">顧客詳細を開く ›</a></div>'
        // 返品情報パネル（返品受付済みのとき）
        + (S.ret
          ? '<div class="adm-card overflow-hidden" style="border-color:#393b56">'
            + '<div class="px-4 py-3 border-b border-[#dcdce6] flex items-center gap-2" style="background:#f0f0fa">'
            + '<span class="w-6 h-6 flex items-center justify-center text-white text-[12px]" style="background:#393b56">R</span>'
            + '<span class="text-[14px] font-bold text-ink">返品情報</span></div>'
            + '<div class="p-4 text-[13px] space-y-1.5">'
            + '<div class="flex justify-between"><span class="text-neutral-500">RMA番号</span><b class="font-display text-ink">'+S.ret.rma+'</b></div>'
            + '<div class="flex justify-between"><span class="text-neutral-500">受付日</span><span class="font-display">'+S.ret.date+'</span></div>'
            + '<div class="flex justify-between"><span class="text-neutral-500">返品理由</span><span class="text-ink">'+S.ret.reason+'</span></div>'
            + '<div class="flex justify-between"><span class="text-neutral-500">返品数量</span><span>'+S.ret.qty+'</span></div>'
            + '<div class="flex justify-between"><span class="text-neutral-500">処理区分</span><span class="text-ink">'+S.ret.refund+'</span></div>'
            + (S.ret.memo?'<div class="pt-1.5 border-t border-[#eee] text-neutral-600">備考：'+S.ret.memo+'</div>':'')
            + '<button onclick="alert(\'返品受付票（RMA）を出力しました。（モック）\')" class="mt-2 w-full text-[13px] border border-[#dcdce6] text-neutral-600 px-3 py-1.5">返品受付票を出力</button>'
            + '</div></div>'
          : '')
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">受注の操作</div>'
        + '<div class="space-y-2">'
        + (S.status==='canceled'
            ? '<div class="text-[13px] text-neutral-500">この受注は「キャンセル」です。IBMへ取消インプット済み（モック）。</div>'
          : S.status==='returned'
            ? '<div class="text-[13px] text-neutral-500">この受注は「返品受付」済みです（RMA発行・IBMへ返品インプット済み）。返品情報は上のパネルをご確認ください。</div>'
            : '<button id="cancelOrder" class="w-full text-[13px] border px-3 py-2 text-left" style="border-color:#e60012;color:#e60012">受注をキャンセル</button>'
              + (S.ship==='出荷済'
                  ? '<button id="returnOrder" class="w-full text-[13px] text-white px-3 py-2 text-left" style="background:#393b56">返品を受け付ける（RMA発行）</button>'
                  : '<div class="text-[12px] text-neutral-400">※ 返品受付は出荷済の受注で可能になります。</div>')
          )
        + '</div>'
        + '<div class="text-[12px] text-neutral-400 mt-2">キャンセル・返品はIBMへ取消／返品インプットされ、請求・在庫に反映されます。</div></div>'
        + '<div class="adm-card p-5"><div class="text-[14px] font-bold text-ink mb-2">関連</div>'
        + '<div class="space-y-1.5 text-[13px]"><a href="admin-orders.html" class="block hover:underline" style="color:#e60012">受注管理一覧 ›</a>'
        + '<a href="admin-shipping.html" class="block hover:underline" style="color:#e60012">出荷・送り状発行 ›</a>'
        + '<a href="admin-invoice.html" class="block hover:underline" style="color:#e60012">請求書発行 ›</a></div></div>'
        + '</div></div>';

      bind();
  }

  function stamp(){ return '2026/07/23 14:05'; }

  function bind(){
      var q=function(id){return document.getElementById(id);};
      if(q('approve')) q('approve').addEventListener('click', function(){
        S.ibm='auto';
        S.history.push({d:stamp(), u:'承認してIBMへインプット（受注IP / 発注IP）', by:'CS 山田'});
        draw();
        alert(o.no+' を承認し、IBMへインプットしました（受注IP / 発注IP）。（モック）');
      });
      if(q('resend')) q('resend').addEventListener('click', function(){
        S.ibm='auto';
        S.history.push({d:stamp(), u:'IBMへ再送信（在庫マスタ再照合）', by:'CS 山田'});
        draw();
        alert('IBMへ再送信しました。（モック）');
      });
      if(q('leadSave')) q('leadSave').addEventListener('click', function(){
        var v=q('leadIn').value;
        if(!v){ alert('回答納期を入力してください。'); return; }
        var changed = !!S.lead;
        S.lead=v.replace(/-/g,'/');
        S.history.push({d:stamp(), u:'回答納期を'+(changed?'変更':'入力')+'（'+S.lead+'）', by:'CS 山田'});
        draw();
        alert(o.no+' の納期をIBMへインプットし、顧客ポータル・進捗メールへ反映しました。（モック）');
      });
      if(q('shipStart')) q('shipStart').addEventListener('click', function(){
        var v=q('shipIn').value;
        if(!v){ alert('出荷日を入力してください。'); return; }
        S.shipDate=v.replace(/-/g,'/');
        S.ship='出荷準備中';
        S.history.push({d:stamp(), u:'出荷連絡を送信・出荷準備中に変更（出荷日 '+S.shipDate+'）', by:'CS 山田'});
        draw();
        alert(o.no+' の出荷連絡（出荷日 '+S.shipDate+'）を顧客へ送り、「出荷準備中」にしました。送り状発行後に「出荷済にする」で確定してください。（モック）');
      });
      if(q('shipEdit')) q('shipEdit').addEventListener('click', function(){
        var v=q('shipIn').value;
        if(!v){ alert('出荷日を入力してください。'); return; }
        S.shipDate=v.replace(/-/g,'/');
        S.history.push({d:stamp(), u:'出荷日を変更（'+S.shipDate+'）', by:'CS 山田'});
        draw();
        alert(o.no+' の出荷日を '+S.shipDate+' に変更し、IBM・顧客ポータルへ反映しました。（モック）');
      });
      if(q('shipDone')) q('shipDone').addEventListener('click', function(){
        var v=q('shipIn').value; if(v) S.shipDate=v.replace(/-/g,'/');
        S.ship='出荷済';
        S.history.push({d:stamp(), u:'出荷済に変更（IBMへ出荷インプット・出荷日 '+S.shipDate+'）', by:'CS 山田'});
        draw();
        alert(o.no+' を出荷済にしました。IBMへ出荷インプットし、顧客ポータルへ反映しました。（モック）');
      });
      if(q('shipBack')) q('shipBack').addEventListener('click', function(){
        if(!confirm(o.no+' を「出荷準備中」に戻しますか？（出荷の修正用）')) return;
        S.ship='出荷準備中';
        S.history.push({d:stamp(), u:'出荷準備中に戻す（出荷修正）', by:'CS 山田'});
        draw();
        alert(o.no+' を「出荷準備中」に戻しました。（モック）');
      });
      if(q('editStart')) q('editStart').addEventListener('click', function(){ S.edit=true; draw(); });
      if(q('editCancel')) q('editCancel').addEventListener('click', function(){ S.edit=false; draw(); });
      if(q('addLine')) q('addLine').addEventListener('click', function(){
        syncEdit();
        S.lines.push({name:'', qty:1, price:0});
        draw();
      });
      document.querySelectorAll('.delLine').forEach(function(b){
        b.addEventListener('click', function(){
          if(S.lines.length<=1){ alert('最後の1行はキャンセルできません。受注全体の取り消しは「受注をキャンセル」から行ってください。'); return; }
          syncEdit();
          var i=+b.getAttribute('data-i');
          var nm=S.lines[i].name||'（無名の品目）';
          S.lines.splice(i,1);
          S.history.push({d:stamp(), u:'明細行をキャンセル（'+nm+'）', by:'CS 山田'});
          draw();
        });
      });
      if(q('editSave')) q('editSave').addEventListener('click', function(){
        syncEdit();
        S.lines=S.lines.filter(function(l){return l.name;});
        if(!S.lines.length) S.lines=[{name:o.items, qty:'一式', price:Math.round(o.amount/1.1)}];
        S.edit=false;
        S.history.push({d:stamp(), u:'受注明細を更新（数量・品目の変更）', by:'CS 山田'});
        draw();
        alert('明細を更新し、IBMへ変更インプットしました。編集したユーザーと日時を履歴に記録しています。（モック）');
      });
      if(q('cancelOrder')) q('cancelOrder').addEventListener('click', function(){
        if(!confirm(o.no+' をキャンセルしますか？\nIBMへ取消インプットされ、顧客ポータルにも反映されます。')) return;
        S.status='canceled';
        S.history.push({d:stamp(), u:'受注をキャンセル（IBMへ取消インプット）', by:'CS 山田'});
        draw();
        alert(o.no+' をキャンセルしました。（モック）');
      });
      if(q('returnOrder')) q('returnOrder').addEventListener('click', function(){
        // 明細ごとの返品数量入力を用意
        q('rtLines').innerHTML='<div class="text-[13px] font-bold text-neutral-600 mb-1">返品対象・数量</div>'
          + S.lines.map(function(l,i){
              return '<div class="flex items-center gap-2 border border-[#dcdce6] px-3 py-2">'
                + '<span class="flex-1 text-[13px] text-neutral-700">'+l.name+'</span>'
                + '<span class="text-[12px] text-neutral-400">返品数</span>'
                + '<input class="rtQ w-16 border border-[#dcdce6] px-2 py-1 text-[13px] text-right font-display" data-i="'+i+'" value="'+(l.qty==='一式'?'1':l.qty)+'"></div>';
            }).join('');
        q('rtReason').value=''; q('rtRefund').selectedIndex=0; q('rtMemo').value='';
        q('rtModal').classList.remove('hidden');
      });
      if(q('rtClose')) q('rtClose').addEventListener('click', function(){ q('rtModal').classList.add('hidden'); });
      if(q('rtCancel')) q('rtCancel').addEventListener('click', function(){ q('rtModal').classList.add('hidden'); });
      if(q('rtSubmit')) q('rtSubmit').addEventListener('click', function(){
        if(!q('rtReason').value){ alert('返品理由を選択してください。'); return; }
        var qtys=[]; document.querySelectorAll('.rtQ').forEach(function(inp){ qtys.push(S.lines[+inp.getAttribute('data-i')].name+' ×'+(inp.value||'0')); });
        var rma='RMA-2607-'+String(15).padStart(3,'0');
        S.ret={ rma:rma, reason:q('rtReason').value, refund:q('rtRefund').value, memo:q('rtMemo').value.trim(), qty:qtys.join('、'), date:stamp().slice(0,10) };
        S.status='returned';
        S.history.push({d:stamp(), u:'返品受付（'+rma+'・'+S.ret.reason+'・'+S.ret.refund+'）IBMへ返品インプット', by:'CS 山田'});
        q('rtModal').classList.add('hidden');
        draw();
        alert(o.no+' の返品を受け付けました。'+rma+' を発行し、IBMへ返品インプット（在庫戻し・'+S.ret.refund+'）しました。（モック）');
      });
  }

  function syncEdit(){
      document.querySelectorAll('.ed').forEach(function(inp){
        var i=+inp.getAttribute('data-i'), k=inp.getAttribute('data-k');
        var v=inp.value;
        if(k==='price') v=+v||0;
        if(k==='qty' && v!=='一式') v=+v||1;
        S.lines[i][k]=v;
      });
  }
</script>
</body>
</html>
