<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <a href="admin-quotes.html" class="inline-flex items-center gap-1 text-[13px] text-neutral-500 hover:text-[color:var(--brand)] mb-3">‹ 見積管理に戻る</a>

  <!-- 工程（この画面は ①→② を処理） -->
  <div class="adm-card p-4 mb-4">
    <div class="flex items-center gap-2 mb-2"><span class="text-[11px] font-bold text-neutral-400 border border-[#dcdce6] px-1.5 py-0.5">図</span><span class="text-[13px] font-bold text-ink">見積業務の流れ</span><span class="text-[12px] text-neutral-400">この画面で ①見積依頼 の確認と ②メーカー見積取得 を行います</span></div>
    <div class="flex items-stretch text-[13px]">
      <!-- ①② はこの画面で対応（1つの赤枠でグループ化） -->
      <div class="flex-[2] rounded-l border-2 border-[#e60012] relative pt-4">
        <span class="absolute -top-2.5 left-3 text-[11px] font-bold text-white px-2 py-0.5" style="background:#e60012">◀ 今ここ（この画面）</span>
        <div class="flex items-stretch h-full">
          <div class="flex-1 flex items-center gap-2 px-3 py-2 text-white" style="background:#e60012"><span class="w-5 h-5 rounded-full flex items-center justify-center text-[11px]" style="background:#fff;color:#e60012">1</span><div class="leading-tight"><div class="font-bold">見積依頼</div><div class="text-[11px] text-white/80">内容を確認</div></div></div>
          <div class="self-center text-white/70 px-1">›</div>
          <div class="flex-1 flex items-center gap-2 px-3 py-2 text-white" style="background:#e60012"><span class="w-5 h-5 rounded-full flex items-center justify-center text-[11px]" style="background:#fff;color:#e60012">2</span><div class="leading-tight"><div class="font-bold">メーカー見積取得</div><div class="text-[11px] text-white/80">原価・納期を入力</div></div></div>
        </div>
      </div>
      <div class="self-center text-neutral-300 px-1">›</div>
      <div class="flex-1 flex items-center gap-2 px-3 py-2" style="background:#f6f6f9"><span class="w-5 h-5 rounded-full flex items-center justify-center text-neutral-400 text-[11px] border border-neutral-300">3</span><div class="leading-tight"><div class="text-neutral-500 font-bold">見積作成</div><div class="text-[11px] text-neutral-400">次の工程</div></div></div>
      <div class="self-center text-neutral-300 px-1">›</div>
      <div class="flex-1 flex items-center gap-2 px-3 py-2 rounded-r" style="background:#f6f6f9"><span class="w-5 h-5 rounded-full flex items-center justify-center text-neutral-400 text-[11px] border border-neutral-300">4</span><div class="leading-tight"><div class="text-neutral-500 font-bold">顧客へ送付</div><div class="text-[11px] text-neutral-400">ポータル掲載</div></div></div>
    </div>
  </div>

  <div id="detail"></div>

  <!-- メーカー見積依頼書（画面外・印刷/PDF時のみ表示） -->
  <div id="printArea" style="position:absolute;left:-10000px;top:0;width:190mm"><div id="rfqSheet"></div></div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var r = getQuoteRequest(qs('id'));

  KMECS.renderAdminShell({
    active:'admin-quotes',
    title:'見積依頼 '+r.id,
    sub:'①見積依頼の内容確認 → ②各明細のメーカー見積（原価・納期）を記録 → ③見積作成へ',
    onReady:function(){
      var c = getCustomer(r.cust) || {company:r.cust, rep:'—', rate:0.8};

      function typeBadge(t){ return t==='特殊見積'
        ? '<span class="badge text-white" style="background:#393b56">特殊見積</span>'
        : '<span class="badge bg-neutral-200 text-neutral-700">一般見積</span>'; }

      var MK_NAME={ moxa:'MOXA / モクサ・ジャパン', odu:'ODU / オーディーユー ジャパン', fraba:'FRABA / POSITAL', ipc:'AXIOMTEK / IPCサプライヤー' };
      function makerOf(l){ return l.custom ? '（取扱外・特注品／サプライヤー未定）' : (MK_NAME[getProduct(l.code).maker] || 'メーカー'); }

      // メーカー見積依頼書（RFQ）を組み立て。メーカーごとにページ分割。
      function buildRFQ(){
        var groups={};
        r.lines.forEach(function(l){ var k=makerOf(l); (groups[k]=groups[k]||[]).push(l); });
        var seal='<span style="display:inline-block;width:56px;height:56px;border:2px solid #e60012;color:#e60012;'
          + 'writing-mode:vertical-rl;text-orientation:upright;font-size:8px;line-height:1.15;letter-spacing:1px;'
          + 'padding:4px 3px;text-align:center;font-weight:700">株式会社ケーメックスONE</span>';
        var keys=Object.keys(groups);
        document.getElementById('rfqSheet').innerHTML = keys.map(function(mk,gi){
          var lines=groups[mk];
          return '<div style="'+(gi<keys.length-1?'page-break-after:always;':'')+'font-family:\'Noto Sans JP\',sans-serif;color:#222;padding:4mm">'
            + '<div style="text-align:center;font-size:22px;font-weight:900;letter-spacing:8px;margin-bottom:6px">見 積 依 頼 書</div>'
            + '<div style="text-align:center;font-size:11px;color:#666;margin-bottom:18px">REQUEST FOR QUOTATION</div>'
            + '<div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:18px">'
            + '<div style="flex:1">'
            + '<div style="font-size:15px;font-weight:700;border-bottom:1px solid #333;padding-bottom:4px;display:inline-block">'+mk+' 御中</div>'
            + '<div style="margin-top:10px;font-size:12px;line-height:1.8">下記につきまして、お見積りをお願い申し上げます。<br>ご多用のところ恐れ入りますが、納期・単価のご回答をお願いいたします。</div>'
            + '</div>'
            + '<div style="width:250px">'
            + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
            + '<img src="assets/img/logo.png" alt="K.MECS ONE" style="height:26px;width:auto">'+seal+'</div>'
            + '<div style="margin-top:8px;font-size:11px;line-height:1.7">株式会社ケーメックスONE<br>〒101-0032 東京都千代田区岩本町2-3-3<br>ザイマックス岩本町ビル3F<br>TEL 03-5825-5333</div>'
            + '<div style="margin-top:8px;font-size:11px;line-height:1.7;border-top:1px solid #ddd;padding-top:6px">'
            + '依頼番号：<b>'+r.id+'</b><br>発行日：2026/07/18<br>希望回答期限：発行後3営業日</div>'
            + '</div></div>'
            + '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px">'
            + '<thead><tr style="background:#f4f4f4">'
            + '<th style="border:1px solid #ccc;padding:7px;text-align:left">No.</th>'
            + '<th style="border:1px solid #ccc;padding:7px;text-align:left">品目 / 型番</th>'
            + '<th style="border:1px solid #ccc;padding:7px;text-align:right">数量</th>'
            + '<th style="border:1px solid #ccc;padding:7px;text-align:right">御見積単価</th>'
            + '<th style="border:1px solid #ccc;padding:7px;text-align:left">御回答納期</th></tr></thead><tbody>'
            + lines.map(function(l,i){
                return '<tr><td style="border:1px solid #ccc;padding:7px">'+(i+1)+'</td>'
                  + '<td style="border:1px solid #ccc;padding:7px">'+reqLineName(l)+'<br><span style="color:#888;font-size:10px">'+reqLineCode(l)+'</span></td>'
                  + '<td style="border:1px solid #ccc;padding:7px;text-align:right">'+l.qty+'</td>'
                  + '<td style="border:1px solid #ccc;padding:7px;text-align:right;color:#bbb">￥　　　　　</td>'
                  + '<td style="border:1px solid #ccc;padding:7px;color:#bbb">　　　　／　　</td></tr>';
              }).join('')
            + '</tbody></table>'
            + '<div style="font-size:11px;line-height:1.9;border:1px solid #ddd;padding:10px 12px">'
            + '<b>ご依頼事項</b><br>・上表の御見積単価・御回答納期をご記入のうえ、ご返送ください。<br>'
            + '・大口数量のため、数量スライド単価がございましたら併せてご提示ください。<br>'
            + '・本件は弊社顧客（'+(getCustomer(r.cust)||{company:''}).company+'）向けの'+r.type+'案件です。'
            + (r.note?'<br>・備考：'+r.note:'')+'</div>'
            + '<div style="margin-top:16px;font-size:11px;color:#666">本依頼に関するお問い合わせ：株式会社ケーメックスONE 担当 '+r.staff+'（TEL 03-5825-5333）</div>'
            + '</div>';
        }).join('');
      }

      function render(){
        var ready = reqMakerReady(r);
        document.getElementById('detail').innerHTML =
          // ①依頼内容
          '<div class="grid lg:grid-cols-3 gap-4">'
          + '<div class="lg:col-span-2 space-y-4">'
          + '<div class="adm-card p-5">'
          + '<div class="flex items-center gap-2 mb-3">'+typeBadge(r.type)
          + '<span class="text-[13px] text-neutral-400">依頼日 '+r.date+' ・ 担当 '+r.staff+'</span></div>'
          + '<div class="text-[13px] font-bold text-neutral-500 mb-1">① 依頼元</div>'
          + '<div class="text-[16px] font-bold text-ink"><a href="admin-customer-detail.html?code='+r.cust+'" class="hover:underline">'+c.company+'</a></div>'
          + '<div class="text-[13px] text-neutral-500 mt-0.5">得値ランク'+(c.rank||'-')+' ・ 掛率'+Math.round((c.rate||0)*100)+'% ・ 担当営業 '+c.rep+'</div>'
          + '<div class="mt-3 pt-3 border-t border-[#eee] text-[13px] font-bold text-neutral-500 mb-1">依頼メモ</div>'
          + '<div class="text-[14px] text-neutral-700">'+(r.note||'—')+'</div></div>'

          // ②メーカー見積取得
          + '<div class="adm-card overflow-hidden" style="border-color:#e60012">'
          + '<div class="px-5 py-3 border-b border-[#dcdce6] flex items-center gap-2" style="background:#fff5f5">'
          + '<span class="w-6 h-6 flex items-center justify-center text-white text-[12px]" style="background:#e60012">2</span>'
          + '<span class="text-[14px] font-bold text-ink">メーカー見積取得（各明細の原価・納期を記録）</span>'
          + (ready?'<span class="badge bg-emerald-100 text-emerald-700 ml-auto">取得済</span>':'<span class="badge text-white ml-auto" style="background:#e60012">未取得あり</span>')+'</div>'
          + '<div class="overflow-x-auto"><table class="w-full adm-table"><thead><tr>'
          + '<th class="text-left px-4 py-2.5">品目 / 型番</th><th class="text-right py-2.5">数量</th>'
          + '<th class="text-right py-2.5">メーカー原価</th><th class="text-left py-2.5 pl-3">メーカー納期</th></tr></thead><tbody>'
          + r.lines.map(function(l,i){
              var name=reqLineName(l), code=reqLineCode(l);
              // 前回仕入れ実績があれば自動入力（未入力の明細のみ）
              var lc = l.custom ? null : lastCost(l.code);
              var val = (l.mkCost!=null) ? l.mkCost : (lc ? lc.val : '');
              var hint = (l.mkCost==null && lc)
                ? (lc.actual
                    ? '<div class="text-[11px] text-emerald-600 mt-0.5">前回仕入れ実績 ¥'+lc.val.toLocaleString()+' を自動入力</div>'
                    : '<div class="text-[11px] text-amber-600 mt-0.5">実績なし・推定 ¥'+lc.val.toLocaleString()+'（要確認）</div>')
                : (l.custom ? '<div class="text-[11px] text-neutral-400 mt-0.5">取扱外／要見積</div>' : '');
              return '<tr class="border-b border-[#eee]"><td class="px-4 py-2.5"><div class="text-[14px] text-ink">'+name+'</div><div class="text-[11px] text-neutral-400 font-display">'+code+'</div></td>'
                + '<td class="py-2.5 text-right font-display">'+l.qty+'</td>'
                + '<td class="py-2.5 text-right"><div class="inline-flex items-center gap-1"><span class="text-neutral-400 text-[13px]">¥</span>'
                + '<input type="number" class="mkCost border border-[#dcdce6] px-2 py-1 text-[13px] w-28 text-right font-display" data-i="'+i+'" value="'+val+'" placeholder="原価"></div>'+hint+'</td>'
                + '<td class="py-2.5 pl-3"><input class="mkLead border border-[#dcdce6] px-2 py-1 text-[13px] w-28" data-i="'+i+'" value="'+(l.mkLead||'')+'" placeholder="例：約2週間"></td></tr>';
            }).join('')
          + '</tbody></table></div>'
          + '<div class="px-5 py-3 flex items-center gap-2 flex-wrap" style="background:var(--lav)">'
          + '<button id="rfqBtn" class="text-[13px] text-white px-3 py-1.5 inline-flex items-center gap-1.5" style="background:#e60012"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9V3h12v6M6 18H4v-6h16v6h-2M8 14h8v7H8z"/></svg>メーカーへ見積依頼書を発行（PDF）</button>'
          + '<button id="mkSave" class="text-[13px] text-white px-3 py-1.5" style="background:#393b56">メーカー見積を記録</button>'
          + '<span class="text-[12px] text-neutral-500">依頼書を発行してメーカーへ送付 → 回答（原価・納期）を記録すると③見積作成へ進めます。</span></div>'
          + '</div></div>'

          // 右：次の工程
          + '<div class="space-y-4">'
          + '<div class="adm-card p-5 sticky top-16">'
          + '<div class="text-[14px] font-bold text-ink mb-2">③ 見積作成へ</div>'
          + '<div class="text-[13px] text-neutral-500 leading-relaxed mb-3">メーカー見積がそろったら、この依頼をもとに顧客向けの見積（得値適用）を作成します。</div>'
          + (ready
              ? '<a href="admin-quote-new.html?from='+r.id+'" class="block text-center text-white py-3 font-bold" style="background:#e60012">この依頼から見積を作成 →</a>'
              : '<button class="block w-full text-center text-white py-3 font-bold opacity-50 cursor-not-allowed" style="background:#e60012" disabled>この依頼から見積を作成 →</button>'
                + '<div class="text-[12px] text-[color:var(--brand)] mt-2">※ 未取得のメーカー見積があります。先に②を記録してください。</div>')
          + '<div class="mt-4 pt-4 border-t border-[#eee] text-[13px] text-neutral-500">'
          + '<div class="flex justify-between py-1"><span>依頼番号</span><b class="font-display text-ink">'+r.id+'</b></div>'
          + '<div class="flex justify-between py-1"><span>明細数</span><span>'+r.lines.length+' 品目</span></div>'
          + '<div class="flex justify-between py-1"><span>種別</span><span>'+r.type+'</span></div></div>'
          + '</div></div></div>';

        document.getElementById('rfqBtn').addEventListener('click', function(){ buildRFQ(); window.print(); });

        document.getElementById('mkSave').addEventListener('click', function(){
          document.querySelectorAll('.mkCost').forEach(function(inp){ var i=+inp.getAttribute('data-i'); r.lines[i].mkCost = inp.value!==''? +inp.value : null; });
          document.querySelectorAll('.mkLead').forEach(function(inp){ var i=+inp.getAttribute('data-i'); r.lines[i].mkLead = inp.value.trim(); });
          if(reqMakerReady(r)){ r.status='ready'; alert('メーカー見積を記録しました。全明細がそろったので、③見積作成へ進めます。（モック）'); }
          else alert('メーカー見積を保存しました。未入力の明細が残っています。（モック）');
          render();
        });
      }
      render();
    }
  });
</script>
</body>
</html>
