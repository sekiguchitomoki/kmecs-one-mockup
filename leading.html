<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <!-- ヒーロー -->
  <section class="relative text-white" style="background:#22243a">
    <div class="absolute inset-0" id="heroBg" style="opacity:.4"></div>
    <div class="relative max-w-[1200px] mx-auto px-4 xl:px-8 py-14">
      <div class="sec-label text-neutral-400">SOLUTIONS BY INDUSTRY</div>
      <div id="hero"></div>
    </div>
  </section>

  <!-- 業界切替タブ -->
  <div class="bg-white border-b border-[color:var(--line)] sticky top-[117px] xl:top-[164px] z-20">
    <div class="max-w-[1200px] mx-auto px-4 xl:px-8 flex gap-1 overflow-x-auto" id="indTabs"></div>
  </div>

  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10" id="main"></div>

  <!-- 導入事例 → セミナー・イベント への導線 -->
  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 pb-14">
    <a href="event.html" class="group block relative overflow-hidden text-white" style="background:#0d1024">
      <img src="assets/img/event-hero.jpg" alt="" class="absolute inset-0 w-full h-full object-cover" style="opacity:.28;object-position:center 35%">
      <div class="absolute inset-0" style="background:linear-gradient(90deg,rgba(13,16,36,.9),rgba(13,16,36,.55))"></div>
      <div class="relative p-8 sm:p-10 flex flex-wrap items-center justify-between gap-5">
        <div>
          <div class="sec-label text-neutral-300">SEMINAR &amp; EVENT</div>
          <h3 class="text-xl sm:text-2xl font-bold mt-2 leading-snug">導入事例のテーマを、セミナー・ウェビナーでも解説しています。</h3>
          <p class="text-[15px] text-neutral-300 mt-2 leading-relaxed">産業用ネットワークの冗長化・IACS UR E26 対応・遠隔監視など、現場課題の解決策をメーカー技術者とともにお届けします。</p>
        </div>
        <span class="inline-flex items-center gap-2 bg-white text-[15px] font-bold px-6 py-3 shrink-0 group-hover:gap-3 transition-all" style="color:#e60012">セミナー・イベントを見る <span>›</span></span>
      </div>
    </a>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var MK_NAME = { moxa:'MOXA', odu:'ODU', fraba:'POSITAL / Fraba', ipc:'AXIOMTEK / IPC' };
  // 注目の導入事例（case-detail.html の id に対応）
  var FEATURED_CASES = [
    { id:'ship-marine-pump',    ind:'船・海洋',        img:'assets/img/case-ship.jpg',      title:'大型フェリー機関室ネットワークの冗長化と深海ポンプの遠隔監視' },
    { id:'machinery-remote-cbm',ind:'マシナリー',      img:'assets/img/case-machinery.jpg', title:'工作機械の遠隔稼働監視と予知保全 — 既設装置を改造せず後付け' },
    { id:'rail-depot-wireless', ind:'鉄道・交通インフラ', img:'assets/img/case-rail.jpg',      title:'車両基地 検修ラインの無線化と車上機器コネクタの信頼性向上' },
  ];
  // 業界キー → 詳細事例id（該当業界ページに事例導線を出す）
  var IND_CASE = { ship:'ship-marine-pump', machinery:'machinery-remote-cbm', rail:'rail-depot-wireless' };
  function tagBadge(t){
    if(t==='EOL予定') return '<span class="badge text-white" style="background:#e60012">EOL予定</span>';
    if(t==='長納期')  return '<span class="badge bg-amber-100 text-amber-700">長納期</span>';
    if(t==='定番')    return '<span class="badge bg-ink text-white">定番</span>';
    if(t==='上位')    return '<span class="badge bg-neutral-200 text-neutral-700">上位機種</span>';
    return '';
  }

  var key = qs('ind');
  var landing = !key;                       // パラメータ無し＝一覧
  var S = landing ? null : getIndustry(key);

  KMECS.renderUserShell({
    active:'case',
    crumbs: landing
      ? [{label:'トップ',href:'index.html'},{label:'業界事例'}]
      : [{label:'トップ',href:'index.html'},{label:'業界事例',href:'leading.html'},{label:S.ja}],
    onReady:function(){
      // 業界タブ（常に全業界。一覧では「一覧」も選択状態に）
      document.getElementById('indTabs').innerHTML =
        '<a href="leading.html" class="px-4 py-4 text-[15px] font-bold whitespace-nowrap border-b-2 '+(landing?'text-ink':'text-neutral-400 border-transparent hover:text-ink')+'" '+(landing?'style="border-color:#e60012"':'')+'>すべての業界</a>'
        + INDUSTRIES.map(function(s){
            var on = !landing && s.key===key;
            return '<a href="leading.html?ind='+s.key+'" class="px-4 py-4 text-[15px] font-bold whitespace-nowrap border-b-2 '+(on?'text-ink':'text-neutral-400 border-transparent hover:text-ink')+'" '+(on?'style="border-color:#e60012"':'')+'>'+s.ja+'</a>';
          }).join('');

      if(landing){
        // ---- 一覧（全業界カード） ----
        document.getElementById('heroBg').style.background='url(assets/img/leading-kv.jpg) center/cover no-repeat';
        document.getElementById('hero').innerHTML =
          '<h1 class="font-display font-black text-4xl mt-2">業界事例から探す</h1>'
          + '<p class="text-neutral-300 text-[16px] mt-3 max-w-2xl leading-relaxed">お客様の業界・用途から、最適な産業用ネットワーク／コネクタ／センサ／組込PCをご提案します。導入シーンごとに主力メーカーと推奨製品をまとめています。</p>';
        document.getElementById('main').innerHTML =
          // 注目の導入事例（詳細ページ case-detail.html への導線）
          '<div class="border-t-2 border-ink pt-3 mb-5 flex items-end justify-between">'
          + '<div><div class="sec-label" style="color:#e60012">CASE STUDY</div><h2 class="text-lg font-bold text-ink mt-0.5">注目の導入事例</h2></div></div>'
          + '<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-12">'
          + FEATURED_CASES.map(function(c){
              return '<a href="case-detail.html?id='+c.id+'" class="card card-h sweep overflow-hidden flex flex-col">'
                + '<div class="h-36 overflow-hidden relative"><img src="'+c.img+'" alt="" class="w-full h-full object-cover sweep-img">'
                + '<span class="absolute top-2 left-2 z-10 badge text-white" style="background:#e60012">'+c.ind+'</span></div>'
                + '<div class="p-4 flex-1 flex flex-col"><div class="text-[15px] font-bold text-ink leading-snug flex-1">'+c.title+'</div>'
                + '<div class="mt-2 text-[14px] font-bold" style="color:#e60012">事例の詳細を見る ›</div></div></a>';
            }).join('')
          + '</div>'
          + '<div class="border-t-2 border-ink pt-3 mb-5"><div class="sec-label">BY INDUSTRY</div><h2 class="text-lg font-bold text-ink mt-0.5">業界から探す</h2></div>'
          + '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">'
          + INDUSTRIES.map(function(s){
              return '<a href="leading.html?ind='+s.key+'" class="card card-h sweep overflow-hidden flex flex-col">'
                + '<div class="h-32 overflow-hidden"><img src="'+s.img+'" alt="" class="w-full h-full object-cover sweep-img"></div>'
                + '<div class="p-4 flex-1 flex flex-col"><div class="sec-label">'+s.en+'</div>'
                + '<div class="text-[16px] font-bold text-ink mt-1">'+s.ja+'</div>'
                + '<p class="text-[14px] text-neutral-500 mt-1 leading-relaxed flex-1">'+s.note+'</p>'
                + '<div class="mt-2 text-[14px] font-bold" style="color:#e60012">事例を見る ›</div></div></a>';
            }).join('')
          + '</div>';
        return;
      }

      // ---- 業界詳細 ----
      document.getElementById('heroBg').style.background='url('+S.img+') center/cover no-repeat';
      document.getElementById('hero').innerHTML =
        '<h1 class="font-display font-black text-4xl mt-2">'+S.ja+'</h1>'
        + '<div class="text-[15px] font-display text-neutral-400 mt-1">'+S.en+'</div>'
        + '<p class="text-neutral-200 text-[16px] max-w-2xl leading-relaxed mt-4">'+S.desc+'</p>'
        + '<div class="flex flex-wrap gap-2 mt-5">'
        + S.makers.map(function(mk){ return '<a href="maker.html?m='+mk+'" class="bg-white/10 hover:bg-white/20 px-3 py-2 text-[14px] inline-flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:#e60012"></span>'+MK_NAME[mk]+' ›</a>'; }).join('')
        + '</div>';

      // 推奨製品（この業界の主力メーカーの製品から）
      var prods = [];
      S.makers.forEach(function(mk){ productsByMaker(mk).slice(0,3).forEach(function(p){ prods.push(p); }); });
      // 重複除去
      var seen={}; prods = prods.filter(function(p){ if(seen[p.code]) return false; seen[p.code]=1; return true; }).slice(0,9);

      // この業界の詳細事例（該当があれば先頭に導線）
      var caseId = IND_CASE[key];
      var fc = caseId ? FEATURED_CASES.filter(function(c){ return c.id===caseId; })[0] : null;
      var caseBanner = fc
        ? '<a href="case-detail.html?id='+fc.id+'" class="card card-h sweep overflow-hidden flex mb-12" style="background:var(--paper)">'
          + '<div class="w-40 sm:w-56 shrink-0 overflow-hidden"><img src="'+fc.img+'" alt="" class="w-full h-full object-cover sweep-img"></div>'
          + '<div class="p-5 flex-1 flex flex-col justify-center"><div class="sec-label" style="color:#e60012">CASE STUDY</div>'
          + '<div class="text-[17px] font-bold text-ink mt-1 leading-snug">'+fc.title+'</div>'
          + '<div class="mt-2 text-[14px] font-bold" style="color:#e60012">この業界の導入事例を見る ›</div></div></a>'
        : '';

      document.getElementById('main').innerHTML =
        caseBanner
        + '<div class="border-t-2 border-ink pt-3 mb-5"><div class="sec-label">USE CASE</div>'
        + '<h2 class="text-lg font-bold text-ink mt-0.5">'+S.ja+' での主な用途</h2></div>'
        + '<div class="grid sm:grid-cols-3 gap-4 mb-12">'
        + S.makers.map(function(mk){ var m=MAKERS[mk];
            return '<div class="card p-5"><div class="font-display font-black text-[17px] text-ink">'+m.name+'</div>'
              + '<div class="text-[14px] mt-1" style="color:#e60012">'+m.tagline+'</div>'
              + '<p class="text-[14px] text-neutral-500 mt-2 leading-relaxed line-clamp-3">'+m.desc+'</p>'
              + '<a href="maker.html?m='+mk+'" class="text-[14px] font-bold mt-3 inline-block" style="color:#e60012">'+m.name+' の製品 ›</a></div>';
          }).join('')
        + '</div>'
        // 推奨製品
        + '<div class="border-t-2 border-ink pt-3 mb-5 flex items-end justify-between">'
        + '<div><div class="sec-label">RECOMMENDED</div><h2 class="text-lg font-bold text-ink mt-0.5">推奨製品</h2></div>'
        + '<a href="products.html?maker='+S.makers[0]+'" class="text-[15px] hover:underline" style="color:#e60012">絞り込み検索へ ›</a></div>'
        + '<div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-5">'
        + prods.map(function(p){
            return '<a href="product-detail.html?code='+p.code+'" class="card card-h overflow-hidden flex flex-col">'
              + '<div class="h-40 relative overflow-hidden bg-white border-b border-[color:var(--line)] flex items-center justify-center p-4"><img src="'+prodImg(p)+'" alt="" class="max-w-full max-h-full object-contain"><div class="absolute top-2 left-2 z-10">'+tagBadge(p.tag)+'</div></div>'
              + '<div class="p-4 flex-1 flex flex-col"><div class="text-[14px] text-neutral-400 font-display">'+MAKERS[p.maker].name+' ・ '+p.code+'</div>'
              + '<div class="text-[17px] font-bold text-ink leading-snug mt-1 flex-1">'+p.name+'</div>'
              + '<div class="mt-3 pt-3 border-t border-[color:var(--line)] flex items-center justify-between"><div class="text-[17px]">'+priceOrMask(p.price)+'</div>'
              + '<span class="text-[14px] font-bold" style="color:#e60012">詳細 ›</span></div></div></a>';
          }).join('')
        + '</div>'
        // 問い合わせ
        + '<div class="card p-8 mt-12 flex flex-wrap items-center justify-between gap-4" style="background:var(--paper)">'
        + '<div><h3 class="text-base font-bold text-ink">'+S.ja+' 向けの構成・選定のご相談</h3>'
        + '<p class="text-[15px] text-neutral-500 mt-1.5">用途に合わせた型番選定・カスタムAssy・大口数量も承ります。担当営業がご対応します。</p></div>'
        + '<a href="contact.html" class="btn-ink whitespace-nowrap">営業に相談する</a></div>';
    }
  });
</script>
</body>
</html>
