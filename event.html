<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <!-- ヒーロー -->
  <section class="relative text-white overflow-hidden" style="background:#22243a">
    <div class="absolute inset-0" style="opacity:.32;background:url(assets/img/bg2.jpg) center/cover no-repeat"></div>
    <div class="relative max-w-[1200px] mx-auto px-4 xl:px-8 py-14">
      <div class="sec-label text-neutral-400">SEMINAR &amp; EVENT</div>
      <h1 class="font-display font-black text-4xl mt-2">セミナー・イベント</h1>
      <p class="text-neutral-300 text-[16px] mt-3 max-w-2xl leading-relaxed">製品ハンズオン・技術セミナー・オンラインウェビナーを定期開催。設計担当者・購買担当者の課題解決に直結するテーマを、メーカー技術者とともにお届けします。</p>
    </div>
  </section>

  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10">
    <!-- ① 開催予定 -->
    <div class="border-t-2 border-ink pt-3 mb-5">
      <div class="sec-label">UPCOMING</div>
      <h2 class="text-lg font-bold text-ink mt-0.5">開催予定のセミナー</h2>
    </div>
    <div id="upGrid" class="grid md:grid-cols-2 gap-5 mb-12"></div>

    <!-- ② アーカイブ -->
    <div class="border-t-2 border-ink pt-3 mb-5">
      <div class="sec-label">ARCHIVE</div>
      <h2 class="text-lg font-bold text-ink mt-0.5">アーカイブ・過去資料</h2>
    </div>
    <div id="arGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

    <div class="card p-6 mt-12 flex flex-wrap items-center justify-between gap-4" style="background:var(--paper)">
      <div>
        <h3 class="text-base font-bold text-ink">個別説明会・出張デモのご相談</h3>
        <p class="text-[15px] text-neutral-500 mt-1.5">貴社の課題に合わせた個別セミナー・製品デモも承ります。担当営業までお気軽にどうぞ。</p>
      </div>
      <a href="contact.html" class="btn-ink whitespace-nowrap">相談する</a>
    </div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  KMECS.renderUserShell({
    active:'event',
    crumbs:[{label:'トップ',href:'index.html'},{label:'セミナー・イベント'}],
    onReady:function(){
      var UP = [
        { date:'2026.08.05', time:'14:00〜15:30', mode:'オンライン', img:'moxa-switch.jpg', title:'産業用ネットワーク基礎セミナー', desc:'Ethernet/シリアルの基礎から冗長化設計まで、はじめての方向けに解説します。' },
        { date:'2026.08.21', time:'13:00〜17:00', mode:'東京・本社会場', img:'support1.jpg', title:'Moxa製品ハンズオン', desc:'EDSスイッチ・NPortの実機に触れながら初期設定を体験。定員20名。' },
        { date:'2026.09.03', time:'15:00〜16:00', mode:'オンライン', img:'case-energy.jpg', title:'防爆/IP67コネクタ選定ウェビナー', desc:'ODU MEDI-SNAP・過酷環境向けコネクタの選定ポイントを短時間で。' },
        { date:'2026.09.18', time:'14:00〜15:30', mode:'大阪営業所', img:'case-logistics.jpg', title:'AGV・搬送設備の無線化セミナー', desc:'AWKによるローミング設計と現場導入の失敗しないポイントを紹介。' }
      ];
      function modeBadge(m){
        return m==='オンライン'
          ? '<span class="badge text-white" style="background:#393b56">'+m+'</span>'
          : '<span class="badge bg-ink text-white">'+m+'</span>';
      }
      document.getElementById('upGrid').innerHTML = UP.map(function(e){
        return '<div class="card overflow-hidden flex flex-col sm:flex-row">'
          + '<div class="sm:w-40 h-32 sm:h-auto shrink-0 overflow-hidden"><img src="assets/img/'+e.img+'" alt="" class="w-full h-full object-cover"></div>'
          + '<div class="p-5 flex-1 flex flex-col">'
          + '<div class="flex items-center gap-2 mb-1.5"><span class="font-display font-bold text-[15px] text-ink">'+e.date+'</span>'+modeBadge(e.mode)+'</div>'
          + '<div class="text-[13px] text-neutral-400 font-display">'+e.time+'</div>'
          + '<div class="text-[16px] font-bold text-ink leading-snug mt-1">'+e.title+'</div>'
          + '<p class="text-[14px] text-neutral-500 mt-1.5 leading-relaxed flex-1">'+e.desc+'</p>'
          + '<a href="contact.html" class="btn-red-o mt-3 self-start !py-2.5 !px-6 !text-[14px]">申し込む</a></div></div>';
      }).join('');

      var AR = [
        { img:'moxa-switch.jpg',     tag:'動画', title:'産業用スイッチ 冗長化設計 実演', date:'2026.05' },
        { img:'cat-connector.jpg',   tag:'スライド', title:'コネクタ選定 実践ワークショップ', date:'2026.04' },
        { img:'moxa-wireless.jpg',   tag:'動画', title:'産業用無線AWK 導入事例セミナー', date:'2026.03' },
        { img:'moxa-serialconv.jpg', tag:'スライド', title:'レガシー設備のIoT化 入門', date:'2026.02' },
        { img:'cat-ipc.jpg',         tag:'動画', title:'ファンレス組込PCの選び方', date:'2026.01' },
        { img:'cat-sensor.jpg',      tag:'スライド', title:'エンコーダ・センサ基礎講座', date:'2025.12' }
      ];
      document.getElementById('arGrid').innerHTML = AR.map(function(a){
        return '<a href="#" class="card card-h sweep overflow-hidden flex flex-col">'
          + '<div class="h-36 relative overflow-hidden border-b border-[color:var(--line)]"><img src="assets/img/'+a.img+'" alt="" class="w-full h-full object-cover sweep-img">'
          + '<span class="absolute inset-0 flex items-center justify-center"><span class="w-12 h-12 rounded-full bg-white/85 flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="#e60012"><path d="M8 5v14l11-7z"/></svg></span></span></div>'
          + '<div class="p-4 flex-1 flex flex-col">'
          + '<div class="flex items-center gap-2 mb-1"><span class="badge border border-[color:var(--line)] text-neutral-500">'+a.tag+'</span><span class="text-[13px] text-neutral-400 font-display">'+a.date+'</span></div>'
          + '<div class="text-[15px] font-bold text-ink leading-snug flex-1">'+a.title+'</div>'
          + '<div class="mt-3 text-[14px] font-bold" style="color:#e60012">資料を見る ›</div></div></a>';
      }).join('');
    }
  });
</script>
</body>
</html>
