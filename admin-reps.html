<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <!-- 営業担当者ごとの売上 -->
  <div class="text-[15px] font-bold text-ink mb-3">営業担当者ごとの売上（担当顧客の年間売上合計・目標達成率）</div>
  <div class="grid md:grid-cols-3 gap-3 mb-6" id="repCards"></div>

  <div class="grid lg:grid-cols-2 gap-4 mb-4">
    <!-- 担当別 売上バー -->
    <div class="adm-card p-5">
      <div class="text-[15px] font-bold text-ink mb-4">担当別 売上構成</div>
      <div class="space-y-3" id="repBars"></div>
    </div>
    <!-- 担当別 顧客数・未入金 -->
    <div class="adm-card overflow-hidden">
      <div class="px-4 py-3 border-b border-[#dcdce6] text-[15px] font-bold text-ink">担当別 サマリ</div>
      <div class="overflow-x-auto"><table class="w-full adm-table"><thead><tr>
        <th class="text-left px-4 py-2.5">担当者</th><th class="text-left py-2.5">部署</th>
        <th class="text-right py-2.5">担当顧客</th><th class="text-right py-2.5">売上</th>
        <th class="text-right py-2.5">粗利額</th><th class="text-right py-2.5">未入金</th><th class="text-right px-4 py-2.5">達成率</th>
      </tr></thead><tbody class="divide-y divide-[#eceef5]" id="repRows"></tbody></table></div>
      <div class="px-4 py-2 text-[12px] text-neutral-400 border-t border-[#eceef5]">※ 粗利額は社内のみ表示（想定粗利率＝得値ランク別）。行クリックで担当者の月次推移を表示します。</div>
    </div>
  </div>

  <!-- 顧客ランキング -->
  <div class="adm-card overflow-hidden">
    <div class="flex flex-wrap items-center justify-between gap-2 px-4 py-3 border-b border-[#dcdce6]">
      <div class="text-[15px] font-bold text-ink">顧客ランキング（年間売上）</div>
      <div class="flex flex-wrap gap-1">
        <select id="fRep" class="border border-[#dcdce6] px-2 py-1 text-[13px] bg-white"></select>
        <button id="sortSales" class="px-3 py-1.5 text-[13px] text-white" style="background:#e60012">売上順</button>
        <button id="sortGrowth" class="px-3 py-1.5 text-[13px] border border-[#dcdce6] bg-white text-neutral-600">成長率順</button>
        <button id="sortUnpaid" class="px-3 py-1.5 text-[13px] border border-[#dcdce6] bg-white text-neutral-600">未入金順</button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full adm-table min-w-[950px]">
        <thead><tr>
          <th class="text-center px-4 py-2.5">順位</th><th class="text-left py-2.5">顧客</th>
          <th class="text-left py-2.5">担当営業</th><th class="text-left py-2.5">得値</th>
          <th class="text-right py-2.5">年間売上</th><th class="text-right py-2.5">前年比</th>
          <th class="text-right py-2.5">受注</th><th class="text-right py-2.5">未入金</th>
          <th class="text-right px-4 py-2.5">構成比</th>
        </tr></thead>
        <tbody class="divide-y divide-[#eceef5]" id="rankRows"></tbody>
      </table>
    </div>
  </div>
  <p class="text-[13px] text-neutral-400 mt-3">※ モックのため、数値はダミーです。</p>

  <!-- 担当者 詳細モーダル -->
  <div id="repModal" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,.45)">
    <div class="absolute inset-0 flex items-start justify-center overflow-y-auto p-4">
      <div class="bg-white w-full max-w-3xl mt-8 shadow-xl" style="border-radius:6px">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-[#eceef5]">
          <div id="rmTitle" class="text-[17px] font-bold text-ink"></div>
          <button id="rmClose" class="text-neutral-400 hover:text-ink text-[22px] leading-none">×</button>
        </div>
        <div id="rmBody" class="p-5"></div>
      </div>
    </div>
  </div>

</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  KMECS.renderAdminShell({
    active:'admin-reps',
    title:'営業担当者・顧客ランキング',
    sub:'担当営業ごとの売上・目標達成率・担当顧客、顧客ランキング',
    onReady:function(){
      var totalSales=CUSTOMERS.reduce(function(s,c){return s+c.salesYear;},0);
      // 想定粗利率（社内のみ表示・得値ランク別）
      function grossRate(rank){ return rank==='A'?0.16 : rank==='B'?0.19 : rank==='C'?0.22 : 0.20; }
      function grossOf(c){ return Math.round(c.salesYear*grossRate(c.rank)); }
      // 直近12ヶ月の季節ウェイト（合計≒1・決め打ち）
      var MW=[0.072,0.078,0.090,0.082,0.086,0.092,0.088,0.080,0.085,0.093,0.079,0.075];
      var MLAB=['25/8','25/9','25/10','25/11','25/12','26/1','26/2','26/3','26/4','26/5','26/6','26/7'];
      function repStat(r){
        var cs=CUSTOMERS.filter(function(c){return c.rep===r.name;});
        var sales=cs.reduce(function(s,c){return s+c.salesYear;},0);
        var unpaid=cs.reduce(function(s,c){return s+c.unpaid;},0);
        var gross=cs.reduce(function(s,c){return s+grossOf(c);},0);
        return { cs:cs, sales:sales, unpaid:unpaid, gross:gross, gpr:sales?Math.round(gross/sales*100):0, rate:Math.round(sales/r.target*100) };
      }
      var reps=REPS.map(function(r){ return Object.assign({}, r, repStat(r)); }).sort(function(a,b){return b.sales-a.sales;});
      var repMax=reps[0].sales;

      // 担当カード（クリックで月次売上推移・粗利額の詳細を表示）
      document.getElementById('repCards').innerHTML=reps.map(function(r,i){
        var ok=r.rate>=100;
        return '<div class="adm-card p-5 repcard cursor-pointer transition hover:border-[color:var(--brand)] hover:shadow-sm" data-r="'+r.name+'">'
          + '<div class="flex items-center justify-between"><div class="flex items-center gap-2">'
          + '<span class="w-8 h-8 rounded-full flex items-center justify-center text-white font-display font-black" style="background:'+(i===0?'#e60012':'#393b56')+'">'+(i+1)+'</span>'
          + '<div><div class="text-[16px] font-bold text-ink">'+r.name+'</div><div class="text-[12px] text-neutral-400">'+r.dept+'</div></div></div>'
          + '<span class="badge" style="background:'+(ok?'#dcfce7':'#fef3c7')+';color:'+(ok?'#166534':'#92400e')+'">達成 '+r.rate+'%</span></div>'
          + '<div class="mt-3"><div class="font-display text-2xl font-black text-ink">'+yen(r.sales)+'</div>'
          + '<div class="text-[12px] text-neutral-400">目標 '+yen(r.target)+' ・ 担当 '+r.cs.length+'社</div></div>'
          + '<div class="mt-2 h-2.5" style="background:#eee"><div class="h-2.5" style="width:'+Math.min(100,r.rate)+'%;background:'+(ok?'#14887b':'#e60012')+'"></div></div>'
          + '<div class="mt-3 pt-3 border-t border-[#eee] flex items-center justify-between text-[13px]"><span class="text-neutral-500">粗利額 <b class="text-ink font-display">'+yen(r.gross)+'</b> <span class="text-neutral-400">(粗利率'+r.gpr+'%)</span></span><span class="text-[color:var(--brand)] font-bold">詳細 ›</span></div>'
          + '</div>';
      }).join('');
      document.querySelectorAll('.repcard').forEach(function(card){
        card.addEventListener('click', function(){ openRep(card.getAttribute('data-r')); });
      });

      // 担当別バー
      document.getElementById('repBars').innerHTML=reps.map(function(r){
        var pct=Math.round(r.sales/repMax*100);
        return '<div><div class="flex justify-between text-[13px] mb-1"><b class="text-ink">'+r.name+'</b><span class="font-display text-neutral-500">'+yen(r.sales)+'</span></div>'
          + '<div class="h-3" style="background:#eee"><div class="h-3" style="width:'+pct+'%;background:#e60012"></div></div></div>';
      }).join('');

      // 担当別テーブル
      document.getElementById('repRows').innerHTML=reps.map(function(r){
        return '<tr class="reprow cursor-pointer hover:bg-[#fafafe]" data-r="'+r.name+'"><td class="px-4 py-3 text-[15px] font-bold text-ink">'+r.name+' <span class="text-[color:var(--brand)] text-[12px]">›</span></td>'
          + '<td class="py-3 text-[13px] text-neutral-500">'+r.dept+'</td>'
          + '<td class="py-3 text-right font-display">'+r.cs.length+'社</td>'
          + '<td class="py-3 text-right font-display font-bold text-ink">'+yen(r.sales)+'</td>'
          + '<td class="py-3 text-right font-display text-emerald-700">'+yen(r.gross)+'<div class="text-[11px] text-neutral-400 font-sans">粗利率'+r.gpr+'%</div></td>'
          + '<td class="py-3 text-right font-display '+(r.unpaid>0?'font-bold':'text-neutral-300')+'" '+(r.unpaid>0?'style="color:#e60012"':'')+'>'+(r.unpaid>0?yen(r.unpaid):'—')+'</td>'
          + '<td class="px-4 py-3 text-right font-display '+(r.rate>=100?'text-emerald-600':'text-amber-600')+' font-bold">'+r.rate+'%</td></tr>';
      }).join('');
      document.querySelectorAll('.reprow').forEach(function(row){
        row.addEventListener('click', function(){ openRep(row.getAttribute('data-r')); });
      });

      // 顧客ランキング
      document.getElementById('fRep').innerHTML='<option value="">全担当</option>'+REPS.map(function(r){return '<option>'+r.name+'</option>';}).join('');
      var SORT='sales';
      function rankBadge(rk){ var c=rk==='A'?'#e60012':rk==='B'?'#393b56':'#8b8ea8'; return '<span class="badge text-white" style="background:'+c+'">得値'+rk+'</span>'; }
      function renderRank(){
        var rep=document.getElementById('fRep').value;
        var list=CUSTOMERS.filter(function(c){ return !rep || c.rep===rep; });
        if(SORT==='sales') list.sort(function(a,b){return b.salesYear-a.salesYear;});
        if(SORT==='growth') list.sort(function(a,b){return (b.salesYear/b.salesPrev)-(a.salesYear/a.salesPrev);});
        if(SORT==='unpaid') list.sort(function(a,b){return b.unpaid-a.unpaid;});
        document.getElementById('rankRows').innerHTML=list.map(function(c,i){
          var yoy=Math.round((c.salesYear/c.salesPrev-1)*100);
          var share=(c.salesYear/totalSales*100).toFixed(1);
          var medal=i===0?'#e60012':i===1?'#c0a02c':i===2?'#b0703a':'#9aa0ad';
          return '<tr class="hover:bg-[#fafafe]">'
            + '<td class="px-4 py-3 text-center"><span class="inline-flex items-center justify-center w-7 h-7 rounded-full text-white font-display font-black text-[13px]" style="background:'+medal+'">'+(i+1)+'</span></td>'
            + '<td class="py-3"><div class="text-[15px] font-bold text-ink">'+c.company+'</div><div class="text-[12px] text-neutral-400">'+c.code+' ・ '+c.area+'</div></td>'
            + '<td class="py-3 text-[14px] text-neutral-700">'+c.rep+'</td>'
            + '<td class="py-3">'+rankBadge(c.rank)+'</td>'
            + '<td class="py-3 text-right font-display font-bold text-ink">'+yen(c.salesYear)+'</td>'
            + '<td class="py-3 text-right font-display '+(yoy>=0?'text-emerald-600':'text-[color:var(--brand)]')+'">'+(yoy>=0?'+':'')+yoy+'%</td>'
            + '<td class="py-3 text-right font-display text-neutral-600">'+c.ordersCount+'</td>'
            + '<td class="py-3 text-right font-display '+(c.unpaid>0?'font-bold':'text-neutral-300')+'" '+(c.unpaid>0?'style="color:#e60012"':'')+'>'+(c.unpaid>0?yen(c.unpaid):'—')+'</td>'
            + '<td class="px-4 py-3 text-right font-display text-neutral-600">'+share+'%</td></tr>';
        }).join('');
      }
      function setSort(s,btn){ SORT=s;
        ['sortSales','sortGrowth','sortUnpaid'].forEach(function(id){ var b=document.getElementById(id); b.className='px-3 py-1.5 text-[13px] border border-[#dcdce6] bg-white text-neutral-600'; b.style.background=''; });
        btn.className='px-3 py-1.5 text-[13px] text-white'; btn.style.background='#e60012'; renderRank();
      }
      document.getElementById('sortSales').addEventListener('click', function(){ setSort('sales', this); });
      document.getElementById('sortGrowth').addEventListener('click', function(){ setSort('growth', this); });
      document.getElementById('sortUnpaid').addEventListener('click', function(){ setSort('unpaid', this); });
      document.getElementById('fRep').addEventListener('change', renderRank);
      renderRank();

      // ===== 担当者 詳細モーダル（月次売上推移・粗利額） =====
      function openRep(name){
        var r=reps.filter(function(x){return x.name===name;})[0]; if(!r) return;
        // 月次売上・粗利（年間値を季節ウェイトで按分）
        var mSales=MW.map(function(w){return Math.round(r.sales*w);});
        var mGross=MW.map(function(w){return Math.round(r.gross*w);});
        var mMax=Math.max.apply(null,mSales);
        var bars='<div class="flex items-end gap-1.5" style="height:150px">'+mSales.map(function(v,i){
          var h=Math.round(v/mMax*130)+8;
          return '<div class="flex-1 flex flex-col items-center justify-end" title="'+MLAB[i]+'：売上 '+yen(v)+' / 粗利 '+yen(mGross[i])+'">'
            + '<div class="w-full relative" style="height:'+h+'px;background:#e60012">'
            + '<div class="w-full absolute bottom-0" style="height:'+Math.round(mGross[i]/mMax*130)+'px;background:#14887b"></div></div></div>';
        }).join('')+'</div>'
          + '<div class="flex gap-1.5 mt-1">'+MLAB.map(function(l){return '<div class="flex-1 text-center text-[10px] text-neutral-400 font-display">'+l+'</div>';}).join('')+'</div>';

        var custList=r.cs.slice().sort(function(a,b){return b.salesYear-a.salesYear;}).map(function(c){
          return '<tr class="border-t border-[#f0f0f4]"><td class="py-2 text-[14px] text-ink font-bold">'+c.company
            + '<span class="badge ml-1 text-white" style="background:'+(c.rank==='A'?'#e60012':c.rank==='B'?'#393b56':'#8b8ea8')+'">得値'+c.rank+'</span></td>'
            + '<td class="py-2 text-right font-display text-ink">'+yen(c.salesYear)+'</td>'
            + '<td class="py-2 text-right font-display text-emerald-700">'+yen(grossOf(c))+'</td>'
            + '<td class="py-2 text-right font-display text-neutral-500">'+Math.round(grossRate(c.rank)*100)+'%</td></tr>';
        }).join('');

        document.getElementById('rmTitle').textContent=r.name+'（'+r.dept+'）— 月次売上・粗利';
        document.getElementById('rmBody').innerHTML=
          '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">'
          + '<div class="p-3" style="background:var(--lav)"><div class="text-[12px] text-neutral-500">年間売上</div><div class="font-display text-xl font-black text-ink">'+yen(r.sales)+'</div></div>'
          + '<div class="p-3" style="background:#f2fbf6"><div class="text-[12px] text-neutral-500">年間粗利額</div><div class="font-display text-xl font-black text-emerald-700">'+yen(r.gross)+'</div></div>'
          + '<div class="p-3" style="background:#f6f5f4"><div class="text-[12px] text-neutral-500">粗利率</div><div class="font-display text-xl font-black text-ink">'+r.gpr+'%</div></div>'
          + '<div class="p-3" style="background:#f6f5f4"><div class="text-[12px] text-neutral-500">目標達成率</div><div class="font-display text-xl font-black '+(r.rate>=100?'text-emerald-600':'text-amber-600')+'">'+r.rate+'%</div></div>'
          + '</div>'
          + '<div class="text-[14px] font-bold text-ink mb-2">月次 売上・粗利 推移（直近12ヶ月）</div>'
          + '<div class="flex items-center gap-4 text-[12px] text-neutral-500 mb-2"><span class="flex items-center gap-1"><span class="w-3 h-3 inline-block" style="background:#e60012"></span>売上</span><span class="flex items-center gap-1"><span class="w-3 h-3 inline-block" style="background:#14887b"></span>粗利</span></div>'
          + bars
          + '<div class="text-[14px] font-bold text-ink mt-6 mb-2">担当顧客別 売上・粗利（'+r.cs.length+'社）</div>'
          + '<table class="w-full"><thead><tr class="text-[12px] text-neutral-400 text-left"><th class="py-1">顧客</th><th class="py-1 text-right">年間売上</th><th class="py-1 text-right">粗利額</th><th class="py-1 text-right">粗利率</th></tr></thead><tbody>'+custList+'</tbody></table>'
          + '<p class="text-[12px] text-neutral-400 mt-3">※ 月次配分・想定粗利率はモック用のダミー値です。粗利は社内管理のみ表示します。</p>';
        document.getElementById('repModal').classList.remove('hidden');
      }
      function closeRep(){ document.getElementById('repModal').classList.add('hidden'); }
      document.getElementById('rmClose').addEventListener('click', closeRep);
      document.getElementById('repModal').addEventListener('click', function(e){ if(e.target===this||e.target===this.firstElementChild) closeRep(); });
    }
  });
</script>
</body>
</html>
