<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <!-- ヘッダー操作（商品詳細の編集・カテゴリー管理は別画面） -->
  <div class="flex flex-wrap items-center gap-2 mb-4">
    <a href="admin-product-edit.html" class="px-4 py-2 text-[14px] font-bold text-white inline-block" style="background:#e60012">＋ 新規商品を追加</a>
    <a href="admin-categories.html" class="px-4 py-2 text-[14px] font-bold border border-[#dcdce6] bg-white text-neutral-600 inline-block hover:border-[color:var(--brand)]">商品カテゴリー管理 ›</a>
    <div class="ml-auto text-[13px] text-neutral-400">WordPress カスタム投稿タイプ「product」への投稿イメージ</div>
  </div>

  <!-- ================= 一覧 ================= -->
  <div id="listView">
    <div class="adm-card p-4 mb-4 flex flex-wrap items-center gap-3">
      <input id="kw" class="flex-1 min-w-[200px] border border-[#dcdce6] px-3 py-2 text-[15px] outline-none focus:border-[color:var(--brand)]" placeholder="商品名・型番で検索">
      <select id="fMaker" class="border border-[#dcdce6] px-3 py-2 text-[14px] bg-white"></select>
      <select id="fStatus" class="border border-[#dcdce6] px-3 py-2 text-[14px] bg-white"><option value="">すべての状態</option><option value="publish">公開</option><option value="draft">非公開（下書き）</option><option value="oos">在庫切れ</option></select>
    </div>
    <div class="adm-card overflow-hidden">
      <div class="px-4 py-3 border-b border-[#dcdce6] flex items-center justify-between">
        <div class="text-[15px] font-bold text-ink">商品（投稿）一覧</div>
        <span class="text-[13px] text-neutral-400"><b id="cnt" class="text-ink">0</b> 件</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full adm-table min-w-[900px]">
          <thead><tr>
            <th class="text-left px-4 py-2.5">画像</th><th class="text-left py-2.5">商品名 / スラッグ</th>
            <th class="text-left py-2.5">型番(SKU)</th><th class="text-left py-2.5">メーカー</th>
            <th class="text-left py-2.5">カテゴリ</th><th class="text-right py-2.5">標準価格</th>
            <th class="text-left py-2.5 pl-3">状態</th><th class="text-right px-4 py-2.5">操作</th>
          </tr></thead>
          <tbody class="divide-y divide-[#eceef5]" id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <p class="text-[13px] text-neutral-400 mt-3">※ モックのため、実際のWordPress投稿・DB保存は行われません。商品の登録・編集は各行の「編集」から別画面で行います。</p>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  // 旧URL互換：?code=XXX で来た場合は編集画面（別URL）へ
  if(qs('code')){ location.replace('admin-product-edit.html?code='+encodeURIComponent(qs('code'))); }

  KMECS.renderAdminShell({
    active:'admin-products',
    title:'商品管理・登録',
    sub:'WordPress カスタム投稿タイプ「product」＋カスタムフィールドで商品を登録し、サイトへ出力',
    onReady:function(){
      /* ---- 一覧 ---- */
      function tagBadge(t){
        // 「定番」「上位」は状態には出さない（ラベルとしても廃止）
        if(t==='EOL予定') return '<span class="badge text-white" style="background:#e60012">EOL予定</span>';
        if(t==='長納期') return '<span class="badge bg-amber-100 text-amber-700">長納期</span>';
        return '';
      }
      document.getElementById('fMaker').innerHTML='<option value="">全メーカー</option>'+Object.keys(MAKERS).map(function(k){return '<option value="'+k+'">'+MAKERS[k].name+'</option>';}).join('');
      // 疑似的に一部をdraft扱い
      function statusOf(p){ return (p.stock%7===0 && p.stock>0)?'draft':'publish'; }
      function renderList(){
        var kw=document.getElementById('kw').value.trim(), mk=document.getElementById('fMaker').value, st=document.getElementById('fStatus').value;
        var list=PRODUCTS.filter(function(p){
          if(mk && p.maker!==mk) return false;
          if(st==='oos'){ if(p.stock>0) return false; }
          else if(st && statusOf(p)!==st) return false;
          if(kw && (p.name+p.code).indexOf(kw)<0) return false;
          return true;
        });
        document.getElementById('cnt').textContent=list.length;
        document.getElementById('rows').innerHTML=list.slice(0,80).map(function(p){
          var s=statusOf(p), pub=(s==='publish'), oos=(p.stock===0);
          // 公開＝緑の帯／非公開（下書き）＝グレーの帯。在庫切れは赤バッジを併記（在庫数を参照）
          var rowBg = pub ? 'background:#f2fbf6;box-shadow:inset 4px 0 0 #10b981;'
                          : 'background:#f7f7f9;box-shadow:inset 4px 0 0 #c4c4cf;';
          var stCell = (pub
            ? '<span class="badge text-white" style="background:#10b981">● 公開中</span>'
            : '<span class="badge text-white" style="background:#9a9aa6">○ 非公開（下書き）</span>')
            + (oos?' <span class="badge text-white" style="background:#e60012">在庫切れ</span>':'');
          return '<tr class="hover:brightness-[.98]" style="'+rowBg+'">'
            + '<td class="px-4 py-2"><div class="w-12 h-12 bg-white border border-[#eee] flex items-center justify-center overflow-hidden"><img src="'+prodImg(p)+'" class="max-h-full max-w-full object-contain"></div></td>'
            + '<td class="py-2"><div class="text-[15px] font-bold text-ink">'+p.name+'</div><div class="text-[12px] text-neutral-400">'+p.code.toLowerCase()+'</div></td>'
            + '<td class="py-2 font-display text-neutral-600">'+p.code+'</td>'
            + '<td class="py-2 text-[14px] text-neutral-600">'+MAKERS[p.maker].name+'</td>'
            + '<td class="py-2 text-[13px] text-neutral-500">'+p.catJa+'</td>'
            + '<td class="py-2 text-right font-display">'+yen(p.price)+'</td>'
            + '<td class="py-2 pl-3">'+stCell+' '+tagBadge(p.tag)+'</td>'
            + '<td class="px-4 py-2 text-right"><a href="admin-product-edit.html?code='+p.code+'" class="text-[13px] text-white px-2.5 py-1 inline-block" style="background:#393b56">編集</a></td></tr>';
        }).join('');
      }
      ['kw','fMaker','fStatus'].forEach(function(id){ document.getElementById(id).addEventListener('input', renderList); document.getElementById(id).addEventListener('change', renderList); });
      renderList();
    }
  });
</script>
</body>
</html>
