<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <div class="max-w-[900px] mx-auto px-4 xl:px-8 py-10" id="main"></div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var id = qs('id');
  var detail = !!id;
  var N = detail ? getNews(id) : null;

  // カテゴリ別の配色（新製品＝ブランド赤／イベント＝ネイビー／お知らせ＝グレー）
  var CAT_STYLE = {
    '新製品情報': 'background:#e60012;color:#fff',
    'イベント情報': 'background:#393b56;color:#fff',
    'お知らせ': 'background:#f0f0f2;color:#555;border:1px solid var(--line)',
  };
  function catBadge(cat){
    var st = CAT_STYLE[cat] || CAT_STYLE['お知らせ'];
    return '<span class="badge" style="'+st+'">'+cat+'</span>';
  }

  // タブ定義（すべて＋3カテゴリ）
  var CAT_TABS = ['すべて','イベント情報','新製品情報','お知らせ'];
  var curCat = 'すべて';

  function filteredNews(){
    return curCat==='すべて' ? NEWS : NEWS.filter(function(n){ return n.cat===curCat; });
  }

  function renderTabs(){
    return '<div class="flex flex-wrap gap-1 mb-6 border-b border-[color:var(--line)]" id="newsTabs">'
      + CAT_TABS.map(function(c){
          var cnt = c==='すべて' ? NEWS.length : NEWS.filter(function(n){ return n.cat===c; }).length;
          var on = c===curCat;
          return '<button type="button" class="news-tab -mb-px px-4 py-2.5 text-[15px] font-bold whitespace-nowrap border-b-2 transition '
            + (on ? 'border-[color:var(--brand)] text-[color:var(--brand)]'
                  : 'border-transparent text-neutral-500 hover:text-ink')
            + '" data-cat="'+c+'">'+c
            + '<span class="ml-1.5 text-[13px] font-normal '+(on?'text-[color:var(--brand)]':'text-neutral-400')+'">('+cnt+')</span>'
            + '</button>';
        }).join('')
      + '</div>';
  }

  function renderList(){
    var list = filteredNews();
    var rows = list.length
      ? list.map(function(n){
          return '<a href="news.html?id='+n.id+'" class="flex flex-wrap items-center gap-3 py-5 group">'
            + '<span class="text-[15px] text-neutral-400 font-display w-24 shrink-0">'+n.date+'</span>'
            + catBadge(n.cat)
            + (n.img ? '<span class="w-24 h-16 shrink-0 overflow-hidden rounded border border-[color:var(--line)] bg-neutral-100"><img src="'+n.img+'" alt="" class="w-full h-full object-cover"></span>' : '')
            + '<span class="text-[16px] text-ink font-medium flex-1 min-w-[200px] group-hover:text-[color:var(--brand)]">'+n.title+'</span>'
            + '<span class="text-neutral-300 shrink-0">›</span></a>';
        }).join('')
      : '<div class="py-12 text-center text-neutral-400 text-[15px]">該当するニュースはありません。</div>';
    var body = document.getElementById('newsList');
    if(body) body.innerHTML = rows;
    var cntEl = document.getElementById('newsCount');
    if(cntEl) cntEl.textContent = list.length + '件';
  }

  KMECS.renderUserShell({
    active:'news',
    crumbs: detail
      ? [{label:'トップ',href:'index.html'},{label:'ニュース',href:'news.html'},{label:N.cat}]
      : [{label:'トップ',href:'index.html'},{label:'ニュース'}],
    onReady:function(){
      if(!detail){
        // ---- 一覧 ----
        document.getElementById('main').innerHTML =
          '<div class="border-t-2 border-ink pt-3 mb-6"><div class="sec-label">NEWS</div>'
          + '<h1 class="text-2xl font-bold text-ink mt-1">ニュース・お知らせ</h1></div>'
          + renderTabs()
          + '<div class="text-[13px] text-neutral-400 mb-2" id="newsCount">'+filteredNews().length+'件</div>'
          + '<div class="divide-y divide-[color:var(--line)]" id="newsList"></div>';

        renderList();

        // タブ切替（#main に委譲＝タブ再生成後もリスナ維持）
        document.getElementById('main').addEventListener('click', function(e){
          var btn = e.target.closest('.news-tab');
          if(!btn) return;
          curCat = btn.getAttribute('data-cat');
          document.getElementById('newsTabs').outerHTML = renderTabs();
          renderList();
        });
        return;
      }

      // ---- 詳細 ----
      var others = NEWS.filter(function(n){ return n.id!==N.id; }).slice(0,4);
      document.getElementById('main').innerHTML =
        '<a href="news.html" class="inline-flex items-center gap-1 text-[14px] text-neutral-500 hover:text-[color:var(--brand)] mb-4">‹ ニュース一覧</a>'
        + '<div class="flex items-center gap-2 text-[14px]">'+catBadge(N.cat)+'<span class="text-neutral-400 font-display">'+N.date+'</span></div>'
        + '<h1 class="text-2xl sm:text-3xl font-bold text-ink leading-snug mt-3 mb-6 pb-6 border-b border-[color:var(--line)]">'+N.title+'</h1>'
        + '<p class="text-[16px] text-neutral-700 leading-loose mb-6">'+N.body+'</p>'
        + '<div class="card p-6 flex flex-wrap items-center justify-between gap-4" style="background:var(--paper)">'
        + '<div><h3 class="text-base font-bold text-ink">お問い合わせ</h3>'
        + '<p class="text-[15px] text-neutral-500 mt-1.5">本件に関するご質問・資料請求は担当営業まで。</p></div>'
        + '<a href="contact.html" class="btn-ink whitespace-nowrap">営業に問い合わせる</a></div>'
        + '<div class="border-t-2 border-ink pt-3 mt-12 mb-4"><div class="sec-label">MORE NEWS</div><h2 class="text-lg font-bold text-ink mt-0.5">ほかのニュース</h2></div>'
        + '<div class="divide-y divide-[color:var(--line)]">'
        + others.map(function(n){
            return '<a href="news.html?id='+n.id+'" class="flex flex-wrap items-center gap-3 py-4 group">'
              + '<span class="text-[14px] text-neutral-400 font-display w-24 shrink-0">'+n.date+'</span>'
              + catBadge(n.cat)
              + '<span class="text-[15px] text-ink flex-1 min-w-[200px] group-hover:text-[color:var(--brand)]">'+n.title+'</span></a>';
          }).join('')
        + '</div>';
    }
  });
</script>
</body>
</html>
