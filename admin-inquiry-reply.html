<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <a href="admin-inquiries.html" class="inline-flex items-center gap-1 text-[13px] text-neutral-500 hover:text-[color:var(--brand)] mb-3">‹ 問合せ管理に戻る</a>
  <div id="detail"></div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var q = getInquiry(qs('id'));

  KMECS.renderAdminShell({
    active:'admin-inquiries',
    title:'問合せへの返信',
    sub:'③問合せ — 顧客からの問合せに返信（送信するとポータル掲載＋メール送付）',
    onReady:function(){
      var c = getCustomer(q.cust) || {company:q.cust, contact:'—', tel:'—'};
      var st = INQ_STATUS[q.status];

      document.getElementById('detail').innerHTML =
        '<div class="grid lg:grid-cols-3 gap-4">'
        // 左：問合せ内容＋返信入力
        + '<div class="lg:col-span-2 space-y-4">'
        + '<div class="adm-card p-5">'
        + '<div class="flex items-center gap-2 flex-wrap mb-2"><span class="badge '+st.cls+'" style="background:'+st.bg+'">'+st.ja+'</span>'
        + '<span class="badge bg-neutral-100 text-neutral-600">'+q.ch+'</span>'
        + '<span class="text-[12px] text-neutral-400 font-display ml-auto">'+q.at+'　'+q.id+'</span></div>'
        + '<div class="text-[18px] font-bold text-ink">'+q.subject+'</div>'
        + '<div class="text-[14px] text-neutral-700 mt-2 leading-relaxed p-3" style="background:var(--lav)">'+q.body+'</div>'
        + (q.reply?'<div class="text-[13px] text-neutral-600 mt-2 pl-3 border-l-2" style="border-color:#14887b"><b class="text-ink">既存の返信：</b>'+q.reply+'</div>':'')
        + '</div>'

        // 返信フォーム（大きな改行可能テキストエリア）
        + '<div class="adm-card p-5">'
        + '<div class="text-[14px] font-bold text-ink mb-1">返信メッセージ</div>'
        + '<div class="text-[12px] text-neutral-400 mb-2">改行して入力できます。送信すると顧客ポータルの注文詳細に表示され、下記アドレスへメール送付されます。（モック）</div>'
        + '<textarea id="reply" rows="12" class="w-full border border-[#dcdce6] px-3 py-2.5 text-[15px] leading-relaxed outline-none focus:border-[color:var(--brand)]" style="resize:vertical;min-height:220px"></textarea>'
        + '<div class="flex items-center gap-2 mt-3 flex-wrap">'
        + '<button id="send" class="text-white px-4 py-2.5 font-bold" style="background:#e60012">返信を送信する</button>'
        + '<button id="draft" class="border border-[#dcdce6] bg-white text-neutral-600 px-4 py-2.5">下書き保存</button>'
        + '<a href="admin-inquiries.html" class="text-[13px] text-neutral-500 hover:underline ml-1">キャンセル</a></div>'
        + '<p class="text-[12px] text-neutral-400 mt-2">※ モックのため実際の送信は行われません。</p>'
        + '</div></div>'

        // 右：宛先・返信先メール
        + '<div class="space-y-4">'
        + '<div class="adm-card p-5">'
        + '<div class="text-[13px] font-bold text-neutral-500 mb-2">返信先（宛先）</div>'
        + '<div class="text-[15px] font-bold text-ink">'+c.company+'</div>'
        + '<div class="text-[13px] text-neutral-500 mt-0.5">ご担当：'+(c.contact||'—')+' 様</div>'
        + '<div class="mt-3 p-3" style="background:#fff5f5;border:1px solid #f3c2c6">'
        + '<div class="text-[12px] text-neutral-500">返信先メールアドレス</div>'
        + '<div class="text-[15px] font-bold" style="color:#e60012"><a href="mailto:'+q.email+'" class="hover:underline break-all">'+q.email+'</a></div></div>'
        + '<div class="mt-3 text-[13px] text-neutral-600 space-y-1">'
        + '<div class="flex justify-between"><span class="text-neutral-400">TEL</span><span class="font-display">'+(c.tel||'—')+'</span></div>'
        + '<div class="flex justify-between"><span class="text-neutral-400">チャネル</span><span>'+q.ch+'</span></div>'
        + '<div class="flex justify-between"><span class="text-neutral-400">担当営業</span><span>'+q.staff+'</span></div></div>'
        + '<div class="mt-3 pt-3 border-t border-[#eee] space-y-1.5 text-[13px]">'
        + '<a href="admin-customer-detail.html?code='+q.cust+'" class="block hover:underline" style="color:#e60012">顧客詳細を開く ›</a>'
        + '<a href="admin-order-detail.html?no='+q.order+'" class="block hover:underline" style="color:#e60012">関連受注 '+q.order+' を開く ›</a></div>'
        + '</div></div></div>';

      // 返信テンプレを初期表示
      document.getElementById('reply').value =
        (c.contact||'ご担当')+' 様\n\nいつもお世話になっております。株式会社ケーメックスONE '+q.staff+' です。\nお問い合わせいただいた「'+q.subject+'」につきまして、\n\n（ここに回答を入力してください）\n\n引き続きよろしくお願いいたします。';

      document.getElementById('send').addEventListener('click', function(){
        var v=document.getElementById('reply').value.trim();
        if(!v){ alert('返信内容を入力してください。'); return; }
        q.reply = v.split('\n')[0]+' …'; q.status='working';
        alert('返信を送信しました。\n宛先：'+q.email+'\n顧客ポータルの注文詳細にも表示されます。（モック）');
        location.href='admin-inquiries.html';
      });
      document.getElementById('draft').addEventListener('click', function(){ alert('下書きを保存しました。（モック）'); });
    }
  });
</script>
</body>
</html>
