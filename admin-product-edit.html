<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">

  <a href="admin-products.html" class="inline-flex items-center gap-1 text-[13px] text-neutral-500 hover:text-[color:var(--brand)] mb-3">‹ 商品一覧に戻る</a>

  <div class="grid lg:grid-cols-3 gap-4">
    <!-- 本文 -->
    <div class="lg:col-span-2 space-y-4">
      <div class="adm-card p-5">
        <input id="p_name" class="w-full border-0 border-b-2 border-[#dcdce6] focus:border-[color:var(--brand)] outline-none text-[22px] font-bold py-2" placeholder="商品名を入力（投稿タイトル）">
        <div class="text-[12px] text-neutral-400 mt-2">パーマリンク：https://kmecsone.jp/products/<span id="p_slug" class="text-[color:var(--brand)]">new-product</span>/</div>
      </div>

      <!-- 本文（商品説明）：画像＋文章のブロック -->
      <div class="adm-card overflow-hidden">
        <div class="px-5 py-3 border-b border-[#dcdce6] flex items-center justify-between">
          <div class="text-[14px] font-bold text-ink">本文（商品説明） <span class="text-[12px] font-normal text-neutral-400 ml-1">画像＋文章のセットで追加できます</span></div>
          <button id="addBlock" class="text-[12px] text-white px-2.5 py-1" style="background:#393b56">＋ ブロックを追加</button>
        </div>
        <div id="blocks" class="p-5 space-y-4"></div>
      </div>

      <!-- カスタムフィールド -->
      <div class="adm-card overflow-hidden">
        <div class="px-5 py-3 border-b border-[#dcdce6] flex items-center gap-2">
          <span class="w-6 h-6 flex items-center justify-center text-white text-[12px]" style="background:#393b56">CF</span>
          <span class="text-[14px] font-bold text-ink">カスタムフィールド（製品情報）</span>
        </div>
        <div class="p-5 grid sm:grid-cols-2 gap-4">
          <div><label class="text-[13px] font-bold text-neutral-600">型番 / SKU <span style="color:#e60012">*</span></label>
            <input id="p_code" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] font-display outline-none focus:border-[color:var(--brand)]" placeholder="例: EDS-408A"></div>
          <div><label class="text-[13px] font-bold text-neutral-600">メーカー</label>
            <select id="p_maker" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] bg-white"></select></div>
          <div><label class="text-[13px] font-bold text-neutral-600">標準価格（税別）</label>
            <input id="p_price" type="number" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] font-display outline-none focus:border-[color:var(--brand)]" placeholder="48000"></div>
          <div><label class="text-[13px] font-bold text-neutral-600">在庫数 <span class="text-[11px] font-normal text-neutral-400">（0で一覧に「在庫切れ」表示）</span></label>
            <input id="p_stock" type="number" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] font-display outline-none focus:border-[color:var(--brand)]" placeholder="24"></div>
          <div><label class="text-[13px] font-bold text-neutral-600">標準納期</label>
            <input id="p_lead" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] outline-none focus:border-[color:var(--brand)]" placeholder="例: 即納 / 2営業日"></div>
          <div><label class="text-[13px] font-bold text-neutral-600">ラベル</label>
            <select id="p_tag" class="w-full mt-1 border border-[#dcdce6] px-3 py-2 text-[15px] bg-white"><option value="">なし</option><option>長納期</option><option>EOL予定</option></select></div>
        </div>

        <!-- カテゴリー（親子孫の階層で選択） -->
        <div class="px-5 pb-2">
          <label class="text-[13px] font-bold text-neutral-600">商品カテゴリー <span class="text-[11px] font-normal text-neutral-400">（親 › 子 › 孫 の階層で選択。カテゴリーの追加は<a href="admin-categories.html" class="underline" style="color:#e60012">カテゴリー管理</a>）</span></label>
          <div class="grid sm:grid-cols-3 gap-2 mt-1.5">
            <select id="cat1" class="border border-[#dcdce6] px-3 py-2 text-[14px] bg-white"></select>
            <select id="cat2" class="border border-[#dcdce6] px-3 py-2 text-[14px] bg-white"></select>
            <select id="cat3" class="border border-[#dcdce6] px-3 py-2 text-[14px] bg-white"></select>
          </div>
          <div class="text-[12px] text-neutral-400 mt-1.5">選択中：<span id="catPath" class="text-ink font-bold">—</span></div>
        </div>

        <!-- 仕様（繰り返しフィールド） -->
        <div class="px-5 py-5">
          <div class="flex items-center justify-between mb-2">
            <label class="text-[13px] font-bold text-neutral-600">仕様（繰り返しフィールド）</label>
            <button id="addSpec" class="text-[12px] text-white px-2.5 py-1" style="background:#393b56">＋ 行を追加</button>
          </div>
          <div id="specRows" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- 公開＋アイキャッチ＋プレビュー -->
    <div class="space-y-4">
      <div class="adm-card overflow-hidden">
        <div class="px-4 py-3 border-b border-[#dcdce6] text-[14px] font-bold text-ink">公開</div>
        <div class="p-4 text-[14px] space-y-2.5">
          <div class="flex justify-between items-center"><span class="text-neutral-500">ステータス</span>
            <select id="p_status" class="border border-[#dcdce6] px-2 py-1 text-[13px] bg-white"><option value="draft">非公開（下書き）</option><option value="publish">公開</option></select></div>
          <div class="flex justify-between items-center"><span class="text-neutral-500">価格表示</span>
            <select id="p_pricevis" class="border border-[#dcdce6] px-2 py-1 text-[13px] bg-white"><option value="after">ログイン後のみ（得値）</option><option value="before">ログイン前も表示（標準価格）</option></select></div>
        </div>
        <div class="flex gap-2 px-4 py-3 border-t border-[#dcdce6]" style="background:var(--lav)">
          <button id="saveDraft" class="flex-1 text-[13px] border border-[#dcdce6] bg-white text-neutral-600 py-2">非公開（下書き）保存</button>
          <button id="publish" class="flex-1 text-[13px] text-white py-2 font-bold" style="background:#e60012">公開（サイトへ出力）</button>
        </div>
      </div>

      <!-- アイキャッチ（アップロード形式） -->
      <div class="adm-card p-4">
        <div class="text-[14px] font-bold text-ink mb-2">アイキャッチ画像</div>
        <label for="p_file" class="block border-2 border-dashed border-[#dcdce6] hover:border-[color:var(--brand)] cursor-pointer text-center px-3 py-5 text-[13px] text-neutral-500">
          <div class="text-[22px] leading-none mb-1">↑</div>
          画像をアップロード<br><span class="text-[11px] text-neutral-400">クリックしてファイルを選択（JPG / PNG）</span>
        </label>
        <input id="p_file" type="file" accept="image/*" class="hidden">
        <div class="text-[12px] text-neutral-400 mt-2" id="fileName">未選択</div>
        <div class="h-32 bg-white border border-[#dcdce6] flex items-center justify-center overflow-hidden mt-2"><img id="imgPrev" src="assets/img/moxa-switch.jpg" class="max-h-full max-w-full object-contain"></div>
      </div>

      <!-- サイト表示プレビュー -->
      <div class="adm-card overflow-hidden">
        <div class="px-4 py-3 border-b border-[#dcdce6] text-[14px] font-bold text-ink">サイト表示プレビュー</div>
        <div class="p-4"><div id="sitePrev"></div></div>
      </div>
    </div>
  </div>

  <p class="text-[13px] text-neutral-400 mt-3">※ モックのため、実際のWordPress投稿・DB保存・画像アップロードは行われません（画像はプレビューのみ）。</p>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  // カテゴリーツリー（親子孫）— admin-categories.html と同じ構成（モック共通定義）
  var CAT_TREE=[
    {name:'ネットワーク機器', children:[
      {name:'有線ネットワーク', children:[{name:'イーサネットスイッチ'},{name:'セキュアルータ'},{name:'メディアコンバータ'},{name:'プロトコルゲートウェイ'}]},
      {name:'無線ネットワーク', children:[{name:'産業用無線AP'},{name:'セルラーゲートウェイ'}]},
      {name:'シリアル通信', children:[{name:'シリアルデバイスサーバ'},{name:'シリアルコンバータ'},{name:'PCIe/シリアルボード'}]},
    ]},
    {name:'コンポーネント', children:[
      {name:'コネクタ', children:[{name:'丸形コネクタ'},{name:'ケーブルアッセンブリ'}]},
      {name:'センサー', children:[{name:'ロータリーエンコーダ'},{name:'傾斜センサー'}]},
    ]},
    {name:'コンピューティング', children:[
      {name:'産業用パソコン', children:[{name:'ボックスPC'},{name:'パネルPC'}]},
      {name:'リモートI/O', children:[{name:'イーサネットI/O'}]},
    ]},
  ];

  var code = qs('code');
  var p = code ? getProduct(code) : null;

  KMECS.renderAdminShell({
    active:'admin-products',
    title: p ? '商品編集 '+p.code : '新規商品を追加',
    sub:'商品詳細の編集（一覧とはURLを分離） ・ カテゴリー階層／価格表示／アイキャッチ／本文ブロック',
    onReady:function(){
      var g=function(id){return document.getElementById(id);};
      g('p_maker').innerHTML=Object.keys(MAKERS).map(function(k){return '<option value="'+k+'">'+MAKERS[k].name+'</option>';}).join('');

      /* ---- カテゴリー階層セレクト（親 › 子 › 孫） ---- */
      function fillCat(sel, arr, ph){
        sel.innerHTML='<option value="">'+ph+'</option>'+(arr||[]).map(function(c,i){return '<option value="'+i+'">'+c.name+'</option>';}).join('');
      }
      function catPath(){
        var i1=g('cat1').value, i2=g('cat2').value, i3=g('cat3').value, path=[];
        if(i1!==''){ path.push(CAT_TREE[i1].name);
          if(i2!==''){ path.push(CAT_TREE[i1].children[i2].name);
            var gc=CAT_TREE[i1].children[i2].children;
            if(i3!=='' && gc) path.push(gc[i3].name);
          }
        }
        g('catPath').textContent = path.length? path.join(' › ') : '—';
        return path;
      }
      fillCat(g('cat1'), CAT_TREE, '親カテゴリーを選択');
      fillCat(g('cat2'), [], '子カテゴリー');
      fillCat(g('cat3'), [], '孫カテゴリー');
      g('cat1').addEventListener('change', function(){
        var i1=this.value;
        fillCat(g('cat2'), i1===''?[]:CAT_TREE[i1].children, '子カテゴリー');
        fillCat(g('cat3'), [], '孫カテゴリー');
        catPath(); syncPrev();
      });
      g('cat2').addEventListener('change', function(){
        var i1=g('cat1').value, i2=this.value;
        fillCat(g('cat3'), (i1===''||i2==='')?[]:(CAT_TREE[i1].children[i2].children||[]), '孫カテゴリー');
        catPath(); syncPrev();
      });
      g('cat3').addEventListener('change', function(){ catPath(); syncPrev(); });

      /* ---- 本文ブロック（画像＋文章のセット） ---- */
      function block(text){
        var d=document.createElement('div');
        d.className='border border-[#dcdce6] p-3';
        d.innerHTML='<div class="flex items-center justify-between mb-2"><span class="text-[12px] font-bold text-neutral-500">画像＋文章ブロック</span>'
          + '<button class="rmb text-neutral-400 hover:text-[color:var(--brand)] text-[12px]">× ブロックを削除</button></div>'
          + '<div class="grid sm:grid-cols-[140px_1fr] gap-3">'
          + '<div><label class="block border-2 border-dashed border-[#dcdce6] hover:border-[color:var(--brand)] cursor-pointer text-center px-2 py-4 text-[11px] text-neutral-500 bimg-label">↑ 画像を<br>アップロード</label>'
          + '<input type="file" accept="image/*" class="bimg hidden">'
          + '<div class="h-20 bg-white border border-[#eee] mt-1.5 flex items-center justify-center overflow-hidden"><img class="bprev max-h-full max-w-full object-contain hidden"></div></div>'
          + '<textarea rows="4" class="btxt border border-[#dcdce6] px-3 py-2 text-[14px] outline-none focus:border-[color:var(--brand)] w-full" placeholder="この画像に対応する説明文を入力">'+(text||'')+'</textarea>'
          + '</div>';
        d.querySelector('.rmb').addEventListener('click', function(){ d.remove(); });
        var f=d.querySelector('.bimg');
        d.querySelector('.bimg-label').addEventListener('click', function(){ f.click(); });
        f.addEventListener('change', function(){
          if(f.files && f.files[0]){
            var rd=new FileReader();
            rd.onload=function(e){ var im=d.querySelector('.bprev'); im.src=e.target.result; im.classList.remove('hidden'); };
            rd.readAsDataURL(f.files[0]);
          }
        });
        return d;
      }
      g('addBlock').addEventListener('click', function(){ g('blocks').appendChild(block('')); });

      /* ---- 仕様（繰り返しフィールド） ---- */
      function specRow(k,v){
        var d=document.createElement('div'); d.className='flex gap-2';
        d.innerHTML='<input class="sk flex-1 border border-[#dcdce6] px-2 py-1.5 text-[13px]" placeholder="項目（例: ポート）" value="'+(k||'')+'">'
          + '<input class="sv flex-1 border border-[#dcdce6] px-2 py-1.5 text-[13px]" placeholder="値（例: 10/100M ×8）" value="'+(v||'')+'">'
          + '<button class="rm text-neutral-400 hover:text-[color:var(--brand)] px-2">×</button>';
        d.querySelector('.rm').addEventListener('click', function(){ d.remove(); });
        return d;
      }
      g('addSpec').addEventListener('click', function(){ g('specRows').appendChild(specRow('','')); });

      /* ---- アイキャッチ（アップロード形式） ---- */
      g('p_file').addEventListener('change', function(){
        if(this.files && this.files[0]){
          g('fileName').textContent=this.files[0].name;
          var rd=new FileReader();
          rd.onload=function(e){ g('imgPrev').src=e.target.result; syncPrev(); };
          rd.readAsDataURL(this.files[0]);
        }
      });

      /* ---- 初期値 ---- */
      if(p){
        g('p_name').value=p.name; g('p_code').value=p.code; g('p_maker').value=p.maker;
        g('p_price').value=p.price; g('p_stock').value=p.stock; g('p_lead').value=p.lead||'即納';
        g('p_tag').value=(p.tag==='長納期'||p.tag==='EOL予定')?p.tag:'';
        g('imgPrev').src=prodImg(p); g('fileName').textContent='現在の画像（'+p.code+'）';
        g('blocks').appendChild(block(p.desc||''));
        var sr=g('specRows'); (p.spec&&p.spec.length?p.spec:[['','']]).forEach(function(s){ sr.appendChild(specRow(s[0],s[1])); });
      }else{
        g('blocks').appendChild(block(''));
        g('specRows').appendChild(specRow('',''));
      }

      /* ---- プレビュー ---- */
      function syncPrev(){
        var name=g('p_name').value||'（商品名）';
        var codev=g('p_code').value||'SKU';
        var mk=g('p_maker').value;
        var price=g('p_price').value;
        var img=g('imgPrev').src;
        var vis=g('p_pricevis').value;
        var path=catPath();
        g('p_slug').textContent=(codev||'new-product').toLowerCase();
        g('sitePrev').innerHTML=
          '<div class="card overflow-hidden" style="max-width:220px">'
          + '<div class="h-28 bg-white border-b border-[color:var(--line)] flex items-center justify-center p-2"><img src="'+img+'" class="max-h-full max-w-full object-contain"></div>'
          + '<div class="p-3"><div class="text-[11px] text-neutral-400 font-display">'+(MAKERS[mk]?MAKERS[mk].name:'')+' ・ '+codev+'</div>'
          + '<div class="text-[13px] font-bold text-ink leading-snug mt-1">'+name+'</div>'
          + '<div class="text-[12px] text-neutral-400 mt-0.5">'+(path.length?path.join(' › '):'カテゴリ未選択')+'</div>'
          + '<div class="mt-2 pt-2 border-t border-[color:var(--line)] text-[12px]">'
          + (vis==='before'
              ? (price? '<span class="font-display font-bold text-ink">'+yen(+price)+'</span><span class="text-neutral-400 text-[11px] ml-1">標準価格</span>' : '<span class="text-neutral-300">価格未設定</span>')
              : '<span class="inline-flex items-center gap-1 text-neutral-400"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>ログインで表示</span>')
          + '</div></div></div>'
          + '<div class="text-[11px] text-neutral-400 mt-2">価格表示：'+(vis==='before'?'ログイン前も標準価格を表示':'ログイン後のみ得値を表示')+'</div>';
      }
      ['p_name','p_code','p_maker','p_price','p_pricevis'].forEach(function(id){
        g(id).addEventListener('input', syncPrev);
        g(id).addEventListener('change', syncPrev);
      });
      syncPrev();

      /* ---- 保存 ---- */
      g('publish').addEventListener('click', function(){
        var name=g('p_name').value, codev=g('p_code').value;
        if(!name||!codev){ alert('商品名と型番(SKU)は必須です。'); return; }
        alert('商品「'+name+'（'+codev+'）」を公開しました。\nWordPress カスタム投稿「product」として保存され、商品検索・メーカーページに出力されます。（モック）');
      });
      g('saveDraft').addEventListener('click', function(){ alert('「非公開（下書き）」として保存しました。一覧にも非公開（下書き）で表示されます。（モック）'); });
    }
  });
</script>
</body>
</html>
