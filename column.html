<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <div class="max-w-[1000px] mx-auto px-4 xl:px-8 py-10" id="main"></div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var id = qs('id');
  var detail = !!id;
  var C = detail ? getColumn(id) : null;
  // コラムのタグ→イメージ（同系統の画像でOK）
  function colImg(tag){
    if(tag==='ODU') return 'assets/img/scat-connector.jpg';
    if(tag==='POSITAL') return 'assets/img/scat-sensor.jpg';
    return IMG.columns[0];
  }

  KMECS.renderUserShell({
    active:'tech',
    crumbs: detail
      ? [{label:'トップ',href:'index.html'},{label:'技術コラム',href:'column.html'},{label:C.tag}]
      : [{label:'トップ',href:'index.html'},{label:'技術コラム'}],
    onReady:function(){
      if(!detail){
        // ---- 一覧 ----
        document.getElementById('main').innerHTML =
          '<div class="border-t-2 border-ink pt-3 mb-6"><div class="sec-label">TECHNICAL COLUMN</div>'
          + '<h1 class="text-2xl font-bold text-ink mt-1">技術コラム</h1>'
          + '<p class="text-[15px] text-neutral-500 mt-2">製品選定・ネットワーク設計・保守のヒントを、取扱メーカーの技術情報をもとにご紹介します。</p></div>'
          + '<div class="grid sm:grid-cols-2 gap-6">'
          + COLUMNS.map(function(c){
              return '<a href="column.html?id='+c.id+'" class="card card-h overflow-hidden flex flex-col">'
                + '<div class="h-44 overflow-hidden"><img src="'+colImg(c.tag)+'" alt="" class="w-full h-full object-cover"></div>'
                + '<div class="p-5 flex-1 flex flex-col">'
                + '<div class="flex items-center gap-2 text-[13px]"><span class="badge bg-ink text-white">'+c.tag+'</span><span class="text-neutral-400 font-display">'+c.date+'</span></div>'
                + '<div class="text-[17px] font-bold text-ink leading-snug mt-2 flex-1">'+c.title+'</div>'
                + '<div class="mt-3 text-[14px] font-bold" style="color:#e60012">続きを読む ›</div></div></a>';
            }).join('')
          + '</div>';
        return;
      }

      // ---- 詳細 ----
      var others = COLUMNS.filter(function(c){ return c.id!==C.id; }).slice(0,4);
      document.getElementById('main').innerHTML =
        '<a href="column.html" class="inline-flex items-center gap-1 text-[14px] text-neutral-500 hover:text-[color:var(--brand)] mb-4">‹ 技術コラム一覧</a>'
        + '<div class="flex items-center gap-2 text-[14px]"><span class="badge bg-ink text-white">'+C.tag+'</span><span class="text-neutral-400 font-display">'+C.date+'</span></div>'
        + '<h1 class="text-3xl font-bold text-ink leading-snug mt-3 mb-4">'+C.title+'</h1>'
        + '<div class="h-64 sm:h-80 overflow-hidden mb-6"><img src="'+colImg(C.tag)+'" alt="" class="w-full h-full object-cover"></div>'
        + (C.lead? '<p class="text-[17px] font-bold text-ink leading-relaxed mb-5 pb-5 border-b border-[color:var(--line)]">'+C.lead+'</p>' : '')
        + C.body.map(function(p){ return '<p class="text-[16px] text-neutral-700 leading-loose mb-5">'+p+'</p>'; }).join('')
        // CTA
        + '<div class="card p-6 mt-8 flex flex-wrap items-center justify-between gap-4" style="background:var(--paper)">'
        + '<div><h3 class="text-base font-bold text-ink">構成・型番選定のご相談</h3>'
        + '<p class="text-[15px] text-neutral-500 mt-1.5">本コラムの内容に関するご質問・お見積りは担当営業まで。</p></div>'
        + '<div class="flex gap-2"><a href="products.html" class="btn-red-o whitespace-nowrap">製品を探す</a><a href="contact.html" class="btn-ink whitespace-nowrap">営業に相談</a></div></div>'
        // 関連コラム
        + '<div class="border-t-2 border-ink pt-3 mt-12 mb-5"><div class="sec-label">MORE COLUMNS</div><h2 class="text-lg font-bold text-ink mt-0.5">ほかの技術コラム</h2></div>'
        + '<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">'
        + others.map(function(c){
            return '<a href="column.html?id='+c.id+'" class="card card-h overflow-hidden flex flex-col">'
              + '<div class="h-28 overflow-hidden"><img src="'+colImg(c.tag)+'" alt="" class="w-full h-full object-cover"></div>'
              + '<div class="p-4 flex-1 flex flex-col"><span class="badge bg-ink text-white self-start text-[12px]">'+c.tag+'</span>'
              + '<div class="text-[14px] font-bold text-ink leading-snug mt-2 flex-1">'+c.title+'</div></div></a>';
          }).join('')
        + '</div>';
    }
  });
</script>
</body>
</html>
