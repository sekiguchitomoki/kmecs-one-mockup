<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケーメックスONE_DEMOサイト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{DEFAULT:'#e60012',dark:'#cc0000'}, navy:'#393b56', ink:'#000000', paper:'#f8f8f8', lav:'#f0f0fa' },
    fontFamily: { sans:['"Noto Sans JP"','sans-serif'], display:['Roboto','"Noto Sans JP"','sans-serif'] },
  }}};
</script>
<link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div id="content">
  <div class="max-w-[1200px] mx-auto px-4 xl:px-8 py-10">
    <div class="sec-label">CART</div>
    <h1 class="sec-title text-3xl mt-1 mb-6">カート</h1>

    <div id="guest" class="hidden card p-16 text-center">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e60012" stroke-width="1.8" class="mx-auto mb-3"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <div class="font-bold text-ink">ご注文にはログインが必要です</div>
      <p class="text-[15px] text-neutral-500 mt-2">価格（得値）の表示・カートのご利用は、お取引先様アカウントでのログイン後にご利用いただけます。</p>
      <a href="login.html" class="btn-red mt-5">ログイン</a>
    </div>

    <div id="main" class="grid lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2">
        <div class="space-y-3" id="items"></div>

        <!-- 上位製品のおすすめ -->
        <div class="mt-8">
          <div class="border-t-2 border-ink pt-3 mb-4">
            <div class="sec-label">UPGRADE</div>
            <h2 class="text-base font-bold text-ink mt-0.5">カート内商品の上位製品はいかがですか？</h2>
          </div>
          <div class="grid sm:grid-cols-3 gap-4" id="upsell"></div>
        </div>
      </div>

      <div class="space-y-4">
        <div class="card p-5">
          <div class="text-[17px] font-bold text-ink mb-3">お支払い金額</div>
          <div class="space-y-2 text-[16px] text-neutral-600" id="totals"></div>
          <a href="checkout.html" class="btn-red w-full mt-4 !py-3.5">注文確認へ</a>
          <a href="products.html" class="block text-center mt-2 text-[15px] hover:underline" style="color:#e60012">買い物を続ける</a>
        </div>

        <div class="card p-5">
          <div class="sec-label">NOTE</div>
          <div class="text-[17px] font-bold text-ink mt-1 mb-2">メモ欄</div>
          <p class="text-[14px] text-neutral-500 mb-2 leading-relaxed">出荷FW・特殊要件などを記録できます。社内（業務・技術）にも共有されます。</p>
          <textarea rows="4" class="w-full border border-[color:var(--line)] px-3 py-2 text-[16px] outline-none focus:border-[color:var(--brand)]">EDS-408AはFW v3.9で出荷希望。納品書は分割不可。</textarea>
        </div>

        <div class="card p-5" style="background:var(--paper)">
          <div class="text-[16px] font-bold text-ink mb-2">この注文について相談</div>
          <p class="text-[14px] text-neutral-500 leading-relaxed">数量・納期のご相談は担当営業へ。メッセージは担当営業と業務に届きます。</p>
          <a href="contact.html" class="btn-red-o w-full mt-3">営業に連絡する</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  var CART = window.CART; // data.js の共通マスタ

  KMECS.renderUserShell({
    active:'',
    crumbs:[{label:'トップ',href:'index.html'},{label:'カート'}],
    onReady:function(){
      var a = KMECS.account();
      if(!a){ document.getElementById('guest').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); return; }

      document.getElementById('items').innerHTML = CART.map(function(c){
        var p = getProduct(c.code);
        return '<div class="card p-4 flex gap-4 items-center">'
          + '<div class="w-24 h-24 shrink-0 overflow-hidden bg-white border border-[color:var(--line)] flex items-center justify-center p-2"><img src="'+prodImg(p)+'" alt="" class="max-w-full max-h-full object-contain"></div>'
          + '<div class="flex-1 min-w-0">'
          + '<a href="product-detail.html?code='+p.code+'" class="text-[17px] font-bold hover:underline" style="color:#e60012">'+p.name+'</a>'
          + '<div class="text-[14px] text-neutral-400 font-display mt-0.5">'+MAKERS[p.maker].name+' ・ '+p.code+'</div>'
          + '<div class="text-[15px] mt-1.5 text-neutral-500">得値 '+priceOrMask(p.price)+' / 個　<s class="text-neutral-300">'+yen(p.price)+'</s></div>'
          + '<div class="text-[14px] mt-1 '+(p.stock>0?'text-emerald-600':'text-amber-600')+'">'+(p.stock>0?'在庫あり':'取寄')+' ・ 納期 '+p.lead+'</div></div>'
          + '<div class="text-center shrink-0"><div class="text-[14px] text-neutral-400 mb-1">数量</div>'
          + '<input type="number" value="'+c.qty+'" class="w-16 border border-[color:var(--line)] px-2 py-1.5 text-[16px] text-center font-display"></div>'
          + '<div class="text-right w-28 shrink-0"><div class="text-[14px] text-neutral-400">小計</div>'
          + '<div class="text-[17px]">'+subtotalOrMask(p.price, c.qty)+'</div></div>'
          + '<button class="text-neutral-300 hover:text-[color:var(--brand)] text-lg shrink-0">&times;</button></div>';
      }).join('');

      // 上位製品おすすめ
      var ups = [ getProduct('EDS-518A'), getProduct('AMC-2P-12W'), getProduct('PPC-156') ];
      document.getElementById('upsell').innerHTML = ups.map(function(p){
        return '<a href="product-detail.html?code='+p.code+'" class="card card-h overflow-hidden flex flex-col">'
          + '<div class="h-24 overflow-hidden bg-white border-b border-[color:var(--line)] flex items-center justify-center p-2"><img src="'+prodImg(p)+'" alt="" class="max-w-full max-h-full object-contain"></div>'
          + '<div class="p-3"><span class="badge bg-neutral-200 text-neutral-700">上位機種</span>'
          + '<div class="text-[15px] font-bold text-ink leading-snug mt-1.5">'+p.name+'</div>'
          + '<div class="text-[16px] mt-1">'+priceOrMask(p.price)+'</div></div></a>';
      }).join('');

      var sub = CART.reduce(function(s,c){ return s + netPrice(getProduct(c.code).price) * c.qty; }, 0);
      var tax = Math.round(sub*0.1);
      document.getElementById('totals').innerHTML =
        '<div class="flex items-center gap-1.5 pb-2 mb-1 border-b border-[color:var(--line)]"><span class="badge bg-neutral-100 text-neutral-600">お客様価格（得値）</span><span class="text-[14px] text-neutral-500">'+a.company+' 適用中</span></div>'
        + '<div class="flex justify-between"><span>小計（得値）</span><span class="font-display">'+yen(sub)+'</span></div>'
        + '<div class="flex justify-between"><span>消費税(10%)</span><span class="font-display">'+yen(tax)+'</span></div>'
        + '<div class="flex justify-between text-[14px] text-neutral-400"><span>送料</span><span>別途</span></div>'
        + '<div class="flex justify-between items-center pt-3 mt-2 border-t-2 border-ink"><span class="font-bold text-ink">合計</span>'
        + '<span class="font-display text-2xl font-black text-ink">'+yen(sub+tax)+'</span></div>'
        + '<div class="text-[14px] text-neutral-400 pt-1">支払条件：'+a.terms+'（掛け売り）</div>';
    }
  });
</script>
</body>
</html>
